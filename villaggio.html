  .card { background: var(--white); cursor: pointer; overflow: hidden; transition: transform 0.3s ease; }

  .btn-listen { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; transition: gap 0.2s; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(26,20,16,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }

  .player-track { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  @media (max-width: 540px) {
    header { padding: 0 4vw; }
    .header-sub { display: none; }
    .hero { padding: 50px 4vw 36px; }
    .filter-bar, .grid { padding: 0 4vw; }
    .modal-content { padding: 24px 20px 28px; }
  }
</style>

    heroSubtitle: 'Sottostante il centro storico di Sant\'Antioco si cela un\'antica necropoli cartaginese, le cui tombe vennero scavate dai Punici tra il IV e il III secolo a.C. Dai recenti studi si stima che l\'area si estenda per circa dieci ettari e contenga circa millecinquecento tombe a camera. Ogni tomba ha due parti fondamentali: il corridoio di accesso, chiamato dromos, e una camera destinata alla deposizione dei defunti e dei loro corredi. Con la fine della dominazione punica molti ipogei vennero abbandonati; altri furono riutilizzati in epoca romana, altri ancora trasformati in catacombe dai primi cristiani. A metà del Settecento alcuni dei nuovi arrivati aprirono gli ipogei e li riutilizzarono come abitazioni, chiamandole "grotte". Calde d\'inverno e fresche d\'estate, le grotte ospitavano famiglie numerose.',

const rooms = [
  {
    id:1, era:"Grotta N.21", category:"grotta",
    img:"./assets/grotta21.jpeg",
    duration:{it:"2:09",en:"1:59",fr:"2:20",de:"1:59"},
    audio:{it:"./audios/villaggio_ipogeo/it/g21.m4a",en:"./audios/villaggio_ipogeo/en/g21.m4a",fr:"./audios/villaggio_ipogeo/fr/g21.m4a",de:"./audios/villaggio_ipogeo/de/g21.m4a"},
    t:{
      it:{
        title:'Grotta N.21 "La Grotta della Signora Antonietta"',
        location:"Villaggio Ipogeo — Sant'Antioco",
        description:"Questa è la più piccola del villaggio, ma anche una delle più significative. La signora Antonietta nacque qui e vi abitò fino al 1998. Pur avendo poi ricevuto un alloggio comunale, continuò a utilizzare la grotta fino alla fine degli anni Novanta, curandola con grande dedizione: puliva, imbiancava con la calce e intrecciava oggetti con le foglie di palma nana, come su filettu, corde e scope di varie forme.\n\nLe nicchie, ampliate nel tempo, venivano usate per riporre gli oggetti di uso quotidiano. Solo negli ultimi anni Antonietta fece costruire un piccolo muro per separare la cucina dalla camera; prima di allora, in tutte le grotte si viveva in un unico ambiente.\n\nLa sua storia racconta la vita semplice ma dignitosa delle famiglie del rione. All'ingresso della grotta si trovava la cucina, con un piccolo camino e il vasellame disposto nelle nicchie. Ogni mattina le donne andavano alla fonte de Is Solus, oggi Piazza Italia, portando brocche d'acqua sulla testa e sui fianchi.\n\nI bambini venivano affidati ai proprietari terrieri per piccoli lavori, mentre le bambine aiutavano nelle case delle famiglie benestanti. Durante l'inverno le famiglie raggiungevano a piedi le località di Triga e Canai, per raccogliere erbe selvatiche; d'estate raccoglievano fichi d'india e altri frutti da scambiare in paese. Grazie al baratto potevano procurarsi pane, latte o formaggio, variando una dieta povera e per lo più vegetariana.\n\nNei mesi di maggio e giugno si intrecciavano le foglie di palma nana per creare corde, ventagli e imbottiture; in autunno si raccoglievano le drupe di lentischio per ricavare l'olio. Durante la bassa marea si raccoglievano patelle, vongole e granchi nella laguna.\n\nLa sera, con il tramonto, le famiglie si riunivano all'aperto: gli anziani raccontavano storie, le donne intrecciavano scope e i bambini giocavano nel rione. A partire dagli anni Cinquanta il Comune di Sant'Antioco iniziò il trasferimento delle famiglie nelle case popolari, un processo lento che si concluse solo nei primi anni Ottanta."
      },
      en:{title:'Cave No.21 "Signora Antonietta\'s Cave"',location:"Hypogean Village — Sant'Antioco",description:"This is the smallest cave in the village but also one of the most meaningful. Mrs. Antonietta was born here and lived here until 1998. Even after receiving public housing, she continued to use the cave until the late 1990s, caring for it with great dedication: she cleaned, whitewashed the walls with lime, and wove objects from dwarf palm leaves, such as su filettu, ropes, and brooms of various shapes.\n\nThe niches, enlarged over time, were used to store everyday objects. Only in her later years did Antonietta have a small wall built to separate the kitchen from the bedroom; before that, all caves consisted of a single room.\n\nHer story tells of the simple yet dignified life of the families in the neighborhood.\n\n the cave’s entrance was the kitchen, with a small fireplace and pottery arranged in the niches. Every morning, women went to the Is Solus spring, today’s Piazza Italia, carrying jugs of water on their heads and hips.\n\nChildren were sent to work for landowners, while the girls helped in the homes of wealthy families. In winter, families walked to the areas of Triga and Canai to gather wild herbs; in summer, they collected prickly pears and other fruits to trade in town.Through bartering, they could obtain bread, milk, or cheese, supplementing their poor, mostly vegetarian diet.\n\nIn May and June, dwarf palm leaves were woven to make ropes, fans, and padding; in autumn, mastic tree berries were gathered to produce oil. During low tide, limpets, clams, and crabs were collected from the lagoon.\n\nIn the evening, at sunset, families gathered outdoors: the elders told stories, the women wove brooms, and the children played in the neighborhood.\n\nStarting in the 1950s, the Municipality of Sant’Antioco began relocating families to public housing, a slow process that was completed only in the early 1980s."},
      fr:{title:'Grotte N°21 "La Grotte de la Signora Antonietta"',location:"Village Hypogée — Sant'Antioco",description:"C’est la plus petite du village, mais aussi l’une des plus significatives.\nMadame Antonietta y est née et y a vécu jusqu’en 1998.\nBien qu’elle ait ensuite reçu un logement communal, elle continua à utiliser la grotte jusqu’à la fin des années 1990, l’entretenant avec un grand soin : elle la nettoyait, la blanchissait à la chaux et tressait des objets avec des feuilles de palmier nain, comme su filettu, des cordes et des balais de différentes formes.\n\nLes niches, élargies au fil du temps, servaient à ranger les objets du quotidien.\n\nCe n’est que dans les dernières années qu’Antonietta fit construire un petit mur pour séparer la cuisine de la chambre ; auparavant, on vivait dans un seul espace.\n\nSon histoire illustre la vie simple mais digne des familles du quartier.\n\nÀ l’entrée de la grotte se trouvait la cuisine, avec une petite cheminée et la vaisselle disposée dans les niches.\n\nChaque matin, les femmes allaient à la source de Is Solus (aujourd’hui Piazza Italia) en portant des cruches d’eau sur la tête et les hanches.\n\nLes garçons étaient confiés aux propriétaires terriens pour de petits travaux, tandis que les filles aidaient dans les maisons des familles aisées.\n\nEn hiver, les familles se rendaient à pied à Triga et Canai pour cueillir des herbes sauvages ; en été, elles ramassaient des figues de Barbarie et d’autres fruits à échanger au village.\n\nGrâce au troc, elles pouvaient obtenir du pain, du lait ou du fromage, diversifiant ainsi une alimentation pauvre et principalement végétarienne.\n\nEn mai et juin, les feuilles de palmier nain étaient tressées pour fabriquer des cordes, des éventails et des rembourrages ; en automne, on récoltait les baies de lentisque pour en extraire l’huile.\n\nÀ marée basse, on ramassait des patelles, des palourdes et des crabes dans la lagune.\n\nLe soir, au coucher du soleil, les familles se réunissaient dehors : les anciens racontaient des histoires, les femmes tressaient des balais et les enfants jouaient dans le quartier.\n\nÀ partir des années 1950, la municipalité de Sant’Antioco commença à reloger les familles dans des logements sociaux, un processus lent qui ne s’acheva qu’au début des années 1980."},
      de:{title:'Grotte Nr.21 "Die Grotte der Signora Antonietta"',location:"Hypogäisches Dorf — Sant'Antioco",description:"Grotte Nr. 21 – Die Grotte der Frau Antonietta\nDies ist die kleinste Grotte des Dorfes, aber auch eine der bedeutendsten. Frau Antonietta wurde hier geboren und lebte hier bis 1998. Auch nachdem sie eine Gemeindewohnung erhalten hatte, nutzte sie die Grotte bis Ende der 1990er Jahre weiter und pflegte sie mit großer Hingabe: Sie reinigte, kalkte die Wände und flocht Gegenstände aus Zwergpalmenblättern, wie su filettu, Seile und Besen in verschiedenen Formen.\n\nDie im Laufe der Zeit erweiterten Nischen wurden verwendet, um Alltagsgegenstände aufzubewahren. Erst in den letzten Jahren ließ Antonietta eine kleine Wand errichten, um die Küche vom Schlafzimmer zu trennen; zuvor bestand jede Grotte aus einem einzigen Raum.\n\nIhre Geschichte erzählt vom einfachen, aber würdevollen Leben der Familien im Viertel.\nAm Eingang der Grotte befand sich die Küche, mit einem kleinen Kamin und Keramikgeschirr, das in den Nischen aufgestellt war. Jeden Morgen gingen die Frauen zur Quelle von Is Solus, dem heutigen Piazza Italia, und trugen Krüge mit Wasser auf dem Kopf und an der Hüfte.\n\nDie Kinder wurden den Landbesitzern für kleine Arbeiten anvertraut, während die Mädchen in den Häusern wohlhabender Familien halfen. Im Winter gingen die Familien zu Fuß in die Gebiete Triga und Canai, um Wildkräuter zu sammeln; im Sommer sammelten sie Feigenkakteen und andere Früchte, die sie im Ort eintauschten.\nDurch Tauschhandel konnten sie Brot, Milch oder Käse bekommen und so ihre einfache, meist vegetarische Ernährung abwechslungsreicher gestalten.Im Mai und Juni flocht man die Blätter der Zwergpalme, um Seile, Fächer und Polstermaterial herzustellen; im Herbst sammelte man Mastixbeeren zur Ölgewinnung. Bei Ebbe wurden Napfschnecken, Muscheln und Krabben in der Lagune gesammelt.\n\nAm Abend, bei Sonnenuntergang, versammelten sich die Familien im Freien: Die Älteren erzählten Geschichten, die Frauen flochten Besen, und die Kinder spielten im Viertel.\nAb den 1950er Jahren begann die Gemeinde Sant’Antioco, die Familien in Sozialwohnungen umzusiedeln – ein langsamer Prozess, der erst Anfang der 1980er Jahre abgeschlossen wurde."},
    }
  },
  {
    id:2, era:"Grotta N.3", category:"grotta",
    img:"./assets/grotta3.jpeg",
    duration:{it:"1:33",en:"1:30",fr:"1:37",de:"1:36"},
    audio:{it:"./audios/villaggio_ipogeo/it/g3.m4a",en:"./audios/villaggio_ipogeo/en/g3.m4a",fr:"./audios/villaggio_ipogeo/fr/g3.m4a",de:"./audios/villaggio_ipogeo/de/g3.m4a"},
    t:{
      it:{
        title:'Grotta N.3 "La Grotta dei Ricordi"',
        location:"Villaggio Ipogeo — Sant'Antioco",
        description:"Questa grotta, utilizzata fino alla fine degli anni Sessanta, ospitava una famiglia molto povera. La camera mostra tracce di un tramezzo, probabilmente abbattuto per creare più spazio, il cui crollo ha causato il cedimento di parte del soffitto. Sul fondo, la camera è stata ingrandita con lo scavo di un vano usato come luogo di riposo, probabilmente chiuso con una tenda. Alla destra dell'ingresso si trova un camino utilizzato per riscaldare, asciugare l'ambiente e cucinare. Il vetro posizionato a terra mette in sicurezza l'apertura e permette di vedere la riproduzione di un testimone di scavo, una tomba punica con copie degli oggetti funerari originari.\n\nAll'interno è allestita una mostra storico-fotografica che racconta la vita nel villaggio dalle fine dell'Ottocento agli anni Sessanta del Novecento. Le fotografie mostrano momenti di vita quotidiana, la semplicità degli ambienti e l'evoluzione del rione. Una delle immagini più famose, scattata da Vittorio Alinari nel 1914, ritrae una coppia, Ciu Canteddu e Cia Annicca Pau, in un momento domestico. Un'altra testimonianza toccante è una cartolina dei primi del Novecento con la scritta \"Grotta troglodita\", che mostra una famiglia all'uscio, con un bambino nudo in braccio.\n\nOgni anno, nel mese di dicembre, la grotta viene allestita per ospitare la Sacra Famiglia durante l'evento natalizio Su Nascimentu in Gruta, un grande presepe vivente che coinvolge tutto il rione con oltre duecento figuranti."
      },
      en:{title:'Cave No.3 "The Cave of Memories"',location:"Hypogean Village — Sant'Antioco",description:"This cave, used until the late 1960s, housed a very poor family. The chamber shows traces of a partition wall, probably demolished to create more space, whose collapse caused part of the ceiling to give way.\nAt the back, the chamber was enlarged by digging a small alcove used as a resting area, probably closed off with a curtain. To the right of the entrance is a fireplace used for heating, drying the air, and cooking.\nThe glass panel placed on the ground secures the opening and allows visitors to see a reproduction of an excavation witness: a Punic tomb with replicas of the original funerary objects.\n\nInside, a historical-photographic exhibition tells the story of life in the village from the late nineteenth century to the 1960s. The photographs show everyday moments, the simplicity of the living spaces, and the evolution of the neighborhood.\nOne of the most famous images, taken by Vittorio Alinari in 1914, portrays a couple, Ciu Canteddu and Cia Annicca Pau, in a domestic scene.\nAnother touching testimony is a postcard from the early 1900s with the caption “Troglodyte Cave,” showing a family at the entrance, with a naked child in their arms.\n\nEvery year, in December, the cave is set up to host the Holy Family during the Christmas event Su Nascimentu in Gruta, a large living nativity scene involving the entire district with over two hundred participants."},
      fr:{title:'Grotte N°3 "La Grotte des Souvenirs"',location:"Village Hypogée — Sant'Antioco",description:"Cette grotte, habitée jusqu’à la fin des années 1960, abritait une famille très pauvre.\nLa pièce montre des traces d’une cloison, probablement abattue pour créer plus d’espace, dont l’effondrement a provoqué l’affaissement d’une partie du plafond.\nAu fond, la chambre a été agrandie par le creusement d’un renfoncement utilisé comme lieu de repos, probablement fermé par un rideau. À droite de l’entrée se trouve une cheminée servant à chauffer, assécher la pièce et cuisiner.\nUne vitre posée au sol sécurise l’ouverture et permet d’observer la reconstitution d’un témoin archéologique : une tombe punique avec des copies d’objets funéraires originaux.\n\nÀ l’intérieur se trouve une exposition historico-photographique retraçant la vie du village de la fin du XIXᵉ siècle aux années 1960.\nLes photographies montrent des scènes de la vie quotidienne, la simplicité des intérieurs et l’évolution du quartier.\nL’une des images les plus célèbres, prise par Vittorio Alinari en 1914, montre un couple — Ciu Canteddu et Cia Annicca Pau, dans une scène domestique.\nUn autre témoignage émouvant est une carte postale du début du XXᵉ siècle portant la mention « Grotte troglodyte », montrant une famille sur le pas de la porte, un enfant nu dans les bras.\n\nChaque année, en décembre, la grotte est aménagée pour accueillir la Sainte Famille lors de l’événement de Noël Su Nascimentu in Gruta, une grande crèche vivante qui implique tout le quartier avec plus de deux cents figurants."},
      de:{title:'Grotte Nr.3 "Die Grotte der Erinnerungen"',location:"Hypogäisches Dorf — Sant'Antioco",description:"Diese Grotte, die bis Ende der 1960er Jahre bewohnt war, beherbergte eine sehr arme Familie. Die Kammer zeigt Spuren einer Zwischenwand, die wahrscheinlich abgerissen wurde, um mehr Platz zu schaffen; ihr Einsturz verursachte den teilweisen Einsturz der Decke.\nIm hinteren Teil wurde die Kammer durch das Ausheben einer kleinen Nische vergrößert, die als Ruheplatz diente und vermutlich mit einem Vorhang abgetrennt war. Rechts vom Eingang befindet sich ein Kamin, der zum Heizen, Trocknen der Luft und Kochen verwendet wurde.\nDie Glasplatte am Boden sichert die Öffnung und ermöglicht den Blick auf eine Nachbildung eines Grabungszeugnisses – ein punisches Grab mit Kopien der ursprünglichen Grabbeigaben.\n\nIm Inneren befindet sich eine historische Fotoausstellung, die das Leben im Dorf vom späten 19. Jahrhundert bis in die 1960er Jahre dokumentiert. Die Fotografien zeigen Alltagsszenen, die Schlichtheit der Räume und die Entwicklung des Viertels.\nder bekanntesten Bilder, aufgenommen von Vittorio Alinari im Jahr 1914, zeigt ein Paar, Ciu Canteddu und Cia Annicca Pau, in einer häuslichen Szene.\nweiteres bewegendes Zeugnis ist eine Postkarte aus den frühen 1900er Jahren mit der Aufschrift „Troglodytengrotte“, die eine Familie am Eingang zeigt, mit einem nackten Kind im Arm.\n\nJedes Jahr im Dezember wird die Grotte für das Weihnachtsereignis Su Nascimentu in Gruta hergerichtet, eine große lebendige Krippe, an der das gesamte Viertel mit über zweihundert Darstellern teilnimmt."},
    }
  },
  {
    id:3, era:"Grotta N.31", category:"grotta",
    img:"./assets/grotta31.jpeg",
    duration:{it:"1:05",en:"1:08",fr:"1:06",de:"1:15"},
    audio:{it:"./audios/villaggio_ipogeo/it/g31.m4a",en:"./audios/villaggio_ipogeo/en/g31.m4a",fr:"./audios/villaggio_ipogeo/fr/g31.m4a",de:"./audios/villaggio_ipogeo/de/g31.m4a"},
    t:{
      it:{
        title:'Grotta N.31 "Sa Grutta Manna"',
        location:"Villaggio Ipogeo — Sant'Antioco",
        description:"È la grotta più grande. Le pareti mostrano varchi scavati per rendere accessibili le camere laterali. Il progetto di restauro ha previsto la chiusura di alcuni ingressi per garantire la stabilità dell'area e creare i camminamenti esterni. La prima camera mantiene la struttura punica originale, quadrangolare, con tramezzo centrale. Sulla destra è stata ricostruita una sepoltura punica integra, con frammenti lignei della cassa e oggetti di corredo.\n\nAttraverso il varco nella parete sinistra si accede a una seconda camera funeraria con un forno di epoca più recente, testimonianza dei riutilizzi nel tempo. Sul fondo si trova una terza camera con un ingresso occluso. Dal varco destro si accede a un'altra stanza dove è allestita una ricostruzione del periodo di riutilizzo, tra il 1754 e il 1966. Qui si può vedere un letto in ferro con oggetti d'uso quotidiano: il vaso da notte, il porta lavamani e altri utensili domestici. L'ultima camera rappresenta la cucina, con il focolare e gli utensili del periodo."
      },
      en:{title:'Cave No.31 "Sa Grutta Manna"',location:"Hypogean Village — Sant'Antioco",description:"This is the largest cave. The walls show openings carved to make the side chambers accessible. The restoration project included closing some entrances to ensure the stability of the area and to create external walkways.\nThe first chamber preserves its original Punic structure, rectangular, with a central partition wall. On the right, a complete Punic burial has been reconstructed, with wooden fragments of the coffin and funerary objects.\n\nThrough the opening in the left wall, visitors reach a second funerary chamber with a later-period oven, a testimony to the site’s reuse over time.\nAt the back is a third chamber with a blocked entrance.\nThrough the right opening, one enters another room where a reconstruction of the reuse period, between 1754 and 1960, is displayed. Here you can see an iron bed with everyday objects: a chamber pot, a washstand, and other household utensils.\nThe last chamber represents the kitchen, with the hearth and period tools."},
      fr:{title:'Grotte N°31 "Sa Grutta Manna"',location:"Village Hypogée — Sant'Antioco",description:"C’est la plus grande grotte. Les parois présentent des ouvertures creusées pour rendre accessibles les chambres latérales.\nLe projet de restauration a prévu la fermeture de certaines entrées afin d’assurer la stabilité de la zone et de créer des passages extérieurs.\nLa première chambre conserve la structure punique originale, rectangulaire, avec une cloison centrale.\nÀ droite, une sépulture punique complète a été reconstituée, avec des fragments en bois du cercueil et des objets funéraires.\n\nPar l’ouverture du mur gauche, on accède à une deuxième chambre funéraire contenant un four d’époque plus récente, témoignage des réutilisations successives.\nAu fond, une troisième chambre possède une entrée murée.\nPar l’ouverture de droite, on pénètre dans une autre pièce où est présentée une reconstitution de la période de réutilisation, entre 1754 et 1960.\nOn y voit un lit en fer, un pot de chambre, un lavabo et divers ustensiles domestiques.\nLa dernière chambre représente la cuisine, avec le foyer et les outils de l’époque."},
      de:{title:'Grotte Nr.31 "Sa Grutta Manna"',location:"Hypogäisches Dorf — Sant'Antioco",description:"Dies ist die größte Grotte. Die Wände zeigen Öffnungen, die ausgehoben wurden, um die Seitenkammern zugänglich zu machen. Das Restaurierungsprojekt sah den Verschluss einiger Eingänge vor, um die Stabilität des Areals zu gewährleisten und Außenwege zu schaffen.\nDie erste Kammer behält ihre ursprüngliche punische Struktur bei, rechteckig, mit zentraler Zwischenwand. Auf der rechten Seite wurde ein vollständig punisches Grab rekonstruiert, mit Holzfragmenten des Sarges und Grabbeigaben.\n\nDurch die Öffnung in der linken Wand gelangt man in eine zweite Grabkammer mit einem Ofen jüngeren Datums, ein Zeugnis der mehrfachen Wiederverwendung im Laufe der Zeit.\nIm hinteren Teil befindet sich eine dritte Kammer mit einem verschlossenen Eingang.\nDurch die rechte Öffnung gelangt man in einen weiteren Raum, in dem eine Rekonstruktion der Wiederverwendungszeit zwischen 1754 und 1960 gezeigt wird. Hier sieht man ein Eisenbett mit Alltagsgegenständen: ein Nachtgefäß, ein Waschgestell und andere Haushaltsutensilien.\nDie letzte Kammer stellt die Küche dar, mit dem Herd und Werkzeugen aus jener Zeit."},
    }
  },
];


let lang = 'it', filter = 'all', curAudio = null, curRoom = null, playing = false;

function setLanguage(l) {
  lang = l;
  const u = UI[l];
  document.documentElement.lang = l;
  document.getElementById('currentFlag').textContent = u.flag;
  document.getElementById('currentLangLabel').textContent = l.toUpperCase();
  document.querySelectorAll('.lang-option').forEach(el => el.classList.toggle('active', el.dataset.lang === l));
  document.getElementById('langSelector').classList.remove('open');
  document.getElementById('headerSub').textContent = u.headerSub;
  document.getElementById('heroTag').textContent = u.heroTag;
  document.getElementById('heroTitle').innerHTML = u.heroTitle;
  document.getElementById('heroSubtitle').textContent = u.heroSubtitle;
  document.getElementById('footerCopy').textContent = u.footerCopy;
  renderFilters(); renderCards();
  if (document.getElementById('modalOverlay').classList.contains('open') && curRoom) refreshModal(curRoom.id);
}
function toggleLangDropdown() { document.getElementById('langSelector').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('langSelector').contains(e.target)) document.getElementById('langSelector').classList.remove('open'); });

function renderFilters() {
  document.getElementById('filterBar').innerHTML = filterCats.map((c,i) =>
    `<button class="filter-btn ${filter===c?'active':''}" onclick="applyFilter('${c}',this)">${filterLabels[lang][i]}</button>`
  ).join('');
}
function applyFilter(c, btn) {
  filter = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function renderCards() {
  const u = UI[lang];
  const list = filter === 'all' || filter === filterCats[0] ? rooms : rooms.filter(r => r.category === filter);
  document.getElementById('grid').innerHTML = list.map(r => {
    const t = r.t[lang];
    const snippet = t.description.replace(/\n/g,' ').slice(0,160)+'…';
    return `<div class="card" onclick="openModal(${r.id})">
      <div class="card-img">
        <img src="${r.img}" alt="${t.title}" loading="lazy">
        <div class="card-era">${r.era}</div>
        <div class="audio-badge"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-location">${t.location}</div>
        <div class="card-title">${t.title}</div>
        <div class="card-text">${snippet}</div>
      </div>
      <div class="card-footer">
        <span class="card-duration">⏱ ${r.duration[lang]}</span>
        <button class="btn-listen">${u.listenBtn}</button>
      </div>
    </div>`;
  }).join('');
}
function openModal(id) {
  curRoom = rooms.find(x => x.id === id);
  if (!curRoom) return;
  stopAudio(); refreshModal(id); setupAudio();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function refreshModal(id) {
  const r = rooms.find(x => x.id === id);
  const t = r.t[lang]; const u = UI[lang];
  document.getElementById('modalImg').src = r.img;
  document.getElementById('modalImg').alt = t.title;
  document.getElementById('modalEra').textContent = r.era;
  document.getElementById('modalLoc').textContent = t.location;
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalDesc').innerHTML = t.description.replace(/\n\n/g,'</p><p style="margin-top:12px">');
  document.getElementById('playerLabel').textContent = u.playerLabel;
  document.getElementById('langPillFlag').textContent = u.flag;
  document.getElementById('langPillText').textContent = u.langName;
  document.getElementById('totalTime').textContent = r.duration[lang];
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
}
function setupAudio() {
  const src = curRoom.audio[lang];
  if (src) {
    curAudio = new Audio(src);
    curAudio.volume = parseFloat(document.getElementById('volumeSlider').value);
    curAudio.addEventListener('timeupdate', updateProgress);
    curAudio.addEventListener('ended', () => { playing=false; updatePlayIcon(); document.getElementById('progressFill').style.width='0%'; document.getElementById('currentTime').textContent='0:00'; });
    curAudio.addEventListener('loadedmetadata', () => { document.getElementById('totalTime').textContent = fmt(curAudio.duration); });
  } else { curAudio = null; }
}
function closeModal(e) { if (e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { stopAudio(); curRoom=null; document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }
function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function togglePlay() { if(!curAudio){alert(UI[lang].noAudio);return;} if(playing){curAudio.pause();playing=false;}else{curAudio.play();playing=true;} updatePlayIcon(); }
function stopAudio() { if(curAudio){curAudio.pause();curAudio.currentTime=0;} playing=false; updatePlayIcon(); }
function updatePlayIcon() {
  const icon=document.getElementById('playIcon'), btn=document.getElementById('playBtn');
  if(playing){icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';btn.classList.add('playing');}
  else{icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';btn.classList.remove('playing');}
}
function updateProgress() { if(!curAudio)return; document.getElementById('progressFill').style.width=(curAudio.currentTime/curAudio.duration*100)+'%'; document.getElementById('currentTime').textContent=fmt(curAudio.currentTime); }
function seekAudio(e) { if(!curAudio||!curAudio.duration)return; const r=document.getElementById('progressBar').getBoundingClientRect(); curAudio.currentTime=((e.clientX-r.left)/r.width)*curAudio.duration; }
function setVolume(v) { if(curAudio)curAudio.volume=parseFloat(v); }
document.addEventListener('keydown', e => {
  if(e.key==='Escape')closeModalDirect();
  if(e.key===' '&&document.getElementById('modalOverlay').classList.contains('open')){e.preventDefault();togglePlay();}
});
setLanguage('it');
</script>
</body>
</html>
