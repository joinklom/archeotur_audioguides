const filterCats = ["struttura","storia"];
const filterLabels = {it:["Tutti","Struttura","Storia"],en:["All","Structure","History"],fr:["Tous","Structure","Histoire"],de:["Alle","Struktur","Geschichte"],};
const rooms = [
  {id:1,era:"Costruzione",category:"struttura",img:"https://images.unsplash.com/photo-1533929736458-ca588d08c8be?w=800&q=80",duration:{it:"4:00",en:"3:55",fr:"4:08",de:"4:15"},audio:{it:null,en:null,fr:null,de:null},t:{it:{title:"La Struttura",location:"Perimetro esterno",description:"Sulla cima della collina che domina la basilica di Sant’Antioco e sovrasta tutt’attorno la necropoli punica dell’antica Sulky, si trova il Forte Sabaudo o “su pisu”. La struttura militare a cielo aperto fu costruita tra il 1813 e il 1815, in pieno periodo sabaudo. A causa delle continue incursioni dei corsari barbareschi le autorità di Sant’Antioco alla fine del settecento predisposero un piano difensivo che prevedeva la costruzione di un piccolo forte all’ingresso dell’isola, nei pressi del ponte romano. Il 22 luglio del 1812 una flotta tunisina approdò nel Golfo di Palmas e i corsari sbarcarono espugnando il fortino e facendo numerosi prigionieri. La popolazione di Sant’Antioco, delusa per la facilità con cui i corsari avevano invaso l’isola, protestò nei confronti del vicerè minacciando l’esodo. Si decise, perciò, di realizzare una nuova fortificazione più vicina al villaggio. I fondi per la costruzione vennero raccolti con una divisione di tasse per ceto sociale e con i finanziamenti del governo. Il progetto fu redatto dall’ufficiale tedesco Ambrogio Capson. Il sito individuato per l’edificazione fu la cima della collina chiamata “Sa guardia de su pisu”. La scelta fu probabilmente motivata da diversi elementi. Vista la scarsità dei fondi per la costruzione si approffittò di strutture militari di epoche precedenti: un nuraghe polilobato a tre torri del 1500 avanti Cristo, e le fortificazioni puniche del 379 avanti Cristo che passavano, come è possibile vedere dai grossi massi di trachite rossa sistemati alla base del forte, Inoltre da quella posizione il forte con i suoi cannoni avrebbe protetto la chiesa di Sant’Antioco e il villaggio costruito attorno ad essa. Nel febbraio del 1813 iniziarono i lavori che proseguirono con alterne vicende per due anni. La scala originaria era addossata alla parete ed era in pietra. L’arcata dell’ingresso e i fori presenti al di sopra fanno capire come nel progetto iniziale fosse previsto un ponte levatoio. A destra in alto si vedono le feritoie della garitta occluse forse durante il restauro. La fortificazione non avevaalloggi per i soldati, ma solo il commodo per la ronda che terminava il turno di guardia. Quattro soldati a turno vegliavano sulla popolazione effettuando la ronda lungo il camminamento del forte. In caso di avvistamento davano l’allarme richiamando soldati e civili all’interno del bastione per l’estrema difesa. Al centro della piazza d’armi fu costruita una “Santa Barbara” dove conservare le munizioni e la polvere da sparo. Ai lati del fortino si trovano alcune piccole feritoie per i fucili e tre più grandi per i cannoni. Un giovane sottotenente di trent’anni, appena diplomato all’accademia militare, venne scelto per il comando delle truppe a difesa del paese. Efisio Melis Alagna ricevette così un incarico di grande responsabilità in un territorio di frontiera. Il comandante dovevaimporre l’autorità agli Artiglieri di Sardegna che aveva ai suoi ordini, assecondare le richieste degli esperti Miliziani, volontari di Sant’Antioco che mettevano la divisa in caso di grave pericolo, e addestrare giovani del villaggio arruolati per utilizzare i cannoni ma non abituati alla disciplina militare. I rapporti con le autorità civili, ecclesiastiche, e con la popolazione non furono totalmente collaborativi, come si può constatare dalle delibere comunali."},
                                                                                                                                                                                                                           en:{title:"The Structure",location:"Outer perimeter",description:"On the summit of the hill overlooking the Basilica of Sant’Antioco and dominating the Punic necropolis of ancient Sulky, stands the Savoy Fortress, known locally as “Su Pisu.” This open-air military structure was built between 1813 and 1815, during the Savoy period. <br>Due to the continuous raids of Barbary corsairs, the authorities of Sant’Antioco developed a defensive plan at the end of the eighteenth century. The plan called for the construction of a small fort at the entrance to the island, near the Roman bridge.<br><br>On July 22, 1812, a Tunisian fleet landed in the Gulf of Palmas. The corsairs captured the fort and took numerous prisoners. Disappointed by the ease with which the corsairs had invaded the island, the inhabitants of Sant’Antioco protested to the Viceroy and threatened to abandon the settlement.<br>As a result, it was decided to build a new fortification closer to the village. Funds were raised through taxes levied according to social class and through government contributions. The project was designed by the German officer Ambrogio Capson.<br>The chosen site was the top of the hill known as “Sa Guardia de Su Pisu.” Several factors probably influenced this decision. Because of limited funds, existing military structures from earlier periods were incorporated into the project: a three-towered Bronze Age nuraghe dating to around 1500 BC and Punic fortifications dating to 379 BC, traces of which can still be seen in the large blocks of red trachyte at the base of the fortress.<br>From this strategic position, the fort and its cannons could protect both the Basilica of Sant’Antioco and the village surrounding it.<br><br>Construction began in February 1813 and continued, with various interruptions, for two years. The original staircase was attached to the wall and built of stone. The entrance arch and the openings above it suggest that the original design included a drawbridge.<br>At the upper right side of the structure, one can still see the loopholes of the sentry box, possibly sealed during restoration work.<br>The fortress contained no permanent barracks for soldiers, only accommodation for the guards completing their watch. Four soldiers at a time patrolled the walls and kept watch over the population. In the event of an enemy sighting, they would sound the alarm, calling both soldiers and civilians into the bastion for a last stand.<br>At the center of the parade ground stood a powder magazine, known as the “Santa Barbara,” where ammunition and gunpowder were stored. Along the sides of the fort are small loopholes for muskets and three larger embrasures for cannons.<br><br>A young thirty-year-old second lieutenant, recently graduated from the military academy, was chosen to command the troops defending the village. Efisio Melis Alagna was thus entrusted with a position of great responsibility in a frontier territory.<br>The commander had to maintain authority over the Sardinian artillerymen under his command, cooperate with the experienced militiamen—volunteers from Sant’Antioco who took up arms in times of danger—and train local young recruits to operate the cannons despite their lack of military discipline.<br>Relations with the civil authorities, the Church, and the local population were not always harmonious, as municipal records clearly demonstrate."},

  {id:2,era:"Battaglia",category:"struttura",img:"https://images.unsplash.com/photo-1558618047-3c8c76ca7d13?w=800&q=80",duration:{it:"3:30",en:"3:25",fr:"3:38",de:"3:42"},audio:{it:null,en:null,fr:null,de:null},t:{it:{title:"La Battaglia",location:"Corpo centrale",description:"Nell’ottobre del 1815 si ebbero le prime avvisaglie di una possibile incursione nel sud della Sardegna. I corsari tunisini tentarono unosbarco nell’isola di San Pietro ma furono avvistati in tempo dalle forze Carlofortine. I barbareschi, non potendo contare sul fattore sorpresa, decisero di cambiare obiettivo e puntarono verso l’isola di Sant’Antioco. Gli invasori sbarcarono una prima volta nella parte occidentale dell’isola, in località Calalunga, e fecero razzia di bestiame. Il capitano dei miliziani, già distintosi nel 1813 nella difesa della tonnara di Calasapone, preoccupato per l’incursione, tornò in paese e chiese al sottotenente di preparare la difesa della città. Domenica 15 ottobre, al tramonto, comparve davanti alle coste dell’isola di Sant’Antioco una flotta che mise in allarme tutta la popolazione, ben presto rassicurata poichè le navi battevano bandiera inglese. Il tenente Alagna, nonpensando ad un inganno dei tunisini, si dimenticò dell’avvertimento ricevuto e non proclamò lo stato d’emegenza. Alle sette del mattino del giorno successivo circa mille corsari, a bordo delle loro scialuppe, presero d’assalto le spiagge di “Is Pruinis” e di “Sa Punta de S’àliga” e da questi luoghi si diressero verso il centro abitato, aggirando il paese dalla parte occidentale ed evitando in questo modo di cadere sotto la portata di fuoco dei cannoni collocati nel vecchio fortino del ponte. Gli abitanti dell’isola si diedero alla fuga verso le campagne mettendo in salvo donne e bambini. Il comandante, per agevolare la fuga degli abitanti, tentò insieme ai suoi soldati e ai miliziani di sostenere l’urto nemico alla periferia del paese ma fu costretto aripiegare a causa dell’eccessivo numero di assalitori, quindi si rifugiò insieme ai suoi soldati nel forte “Su Pisu”. Prima che i lavori del forte cominciassero, le case del villaggio erano andate estendendosi sino al nuraghe ed alla roccaforte punica. In questo modo, al momento dell’attacco, le mura del forte si trovavano quasi a contatto con le abitazioni. Nonostante tutto sia i militari che i civili ritenevano che il forte fosse inespugnabile. La guarnigione presente al momento dell’assalto era di circa venticinque soldati tra artiglieri, miliziani e cannonieri. Nella fortificazione si rifugiarono anche alcuni cittadini. Il comandante tunisino, giunto col suo esercito ai piedi della roccaforte, ordinò l’assalto. I difensori inizialmente opposero una strenua evalida resistenza agli attacchi tunisini. Gli assalti continuarono per circa sette ore e il forte sembrava veramente inespugnabile. I tunisini erano sul punto di terminare le munizioni ma riuscirono a portare avanti ugualmente l’assalto. Il tenente, durante la ritirata, non aveva avuto il tempo di prendere le armi e le munizioni custodite nella sua abitazione. Ne approfittarono invece i tunisini che poterono così proseguire il loro tentativo di espugnazione. Il comandante tunisino a questo punto adottò una strategia che risultò vincente. Gran parte dei tunisini concentrarono i loro attacchi nella parte nord-occidentale del forte, attirando sugli spalti settentrionali la guarnigione. Un gruppo di invasori, invece, approfittando della mancanza di difensori nella parteorientale, riuscì a penetrare nel forte utilizzando un telaio di un carro per issarsi sopra il tetto di un magazzino addossato al fortilizio. Gli assalitori poterono contare sul fattore sorpresa, assaltando dall'interno la roccaforte e circondando le sparute forze a difesa della struttura. Il comandante e dieci suoi uomini rimasero uccisi nello scontro, mentre i restanti soldati sopravissuti e i civili rifugiati nella struttura furono costretti ad arrendersi alle forze nemiche. Furono in tutto sulle centotrenta le persone che vennero catturate dai pirati barbareschi, e assieme a queste vi era la sorella dell'ufficiale Alagna. Le trattative per la liberazione dei prigionieri durarono sei mesi, al termine dei quali venne concordato un pagamento del riscatto, e garantito il ritorno a casa dei sequestrati. Il comandante della guarnigione, Melis Alagna fu inizialmente sepolto nel cimitero del villaggio e in seguito, su delega concessa dal Vescovo, la salma venne riesumata e trasferita nella chiesa di Sant’Antioco dove il corpo fu onorato da un’iscrizione in caratteri romani. A ricordo di quel tragico avvenimento venne apposta una targa commemorativa con i nomi dei coraggiosi che diedero la vita per la difesa del paese e della sua gente. Le informazioni riguardanti l'assalto del 1815, raccolte e conservate nell'archivio storico comunale di Sant'Antioco, ci arrivano dalle testimonianze di quelli stessi militari sopravissuti alla battaglia, che una volta rientrati dalla prigionia poterono fare così rapporto. L’incursione a Sant’Antioco suscitò la reazione delle potenze europee e in particolare dell’Inghilterra, desiderosa di imporre la propria supremazia nel Mediterraneo. Pertanto venne inviato come mediatore l’Ammiraglio lord Exstamouth, anche in rappresentanza del re di Sardegna e del Regno delle Due Sicilie; egli si presentò, a comando di una grande flotta, di fronte alle reggenze africane di Tunisi, Tripoli e Algeri, L'ammiraglio impose un ultimatum, richiedendo che le seguenti condizioni venissero accettate: la reciproca libertà di commercio, l'ammissione di consoli sardi nei territori Africani, e l’abolizione della schiavitù in Nord-Africa. Il Bey di Algeri chiese sei mesi di tempo per consultare la Turchiache rimaneva, almeno nominalmente, detentrice del potere in Nord Africa. L’argomento non convinse le grandi potenze, Inghilterra e Olanda, che diedero perciò prova di forza bombardando Algeri. Sovverchiata dai nemici, Algeri fu costretta ad accettare le condizioni. Tutti gli schiavi ancora prigionieri in nord-africa furono liberati: migliaia di uomini, donne e bambini provenienti da tutti i lati del mediterraneo poterono tornare finalmente alle proprie case, dopo anni di servitù in Africa. Il governo sabaudo dopo questo grave episodio decise di inviare un nutrito contingente militare a difesa dell’isola, e poco tempo dopo anche il regno di Sardegna stabilì un patto di non belliggeranza in accordo con il Bey di Tunisi. La presa di Sant’Antioco del 1815 rappresentòl’ultima grande incursione dei barbareschi nel Mediterraneo."},

let lang = 'it', filter = 'all', curAudio = null, curRoom = null, playing = false;

function setLanguage(l) {
  lang = l;
  const u = UI[l];
  document.documentElement.lang = l;
  document.getElementById('currentFlag').textContent = u.flag;
  document.getElementById('currentLangLabel').textContent = l.toUpperCase();
  document.querySelectorAll('.lang-option').forEach(el => el.classList.toggle('active', el.dataset.lang === l));
  document.getElementById('langSelector').classList.remove('open');
  document.getElementById('headerSub').textContent = u.headerSub;
  document.getElementById('heroTag').textContent = u.heroTag;
  document.getElementById('heroTitle').innerHTML = u.heroTitle;
  document.getElementById('heroSubtitle').textContent = u.heroSubtitle;
  document.getElementById('footerCopy').textContent = u.footerCopy;
  renderFilters(); renderCards();
  if (document.getElementById('modalOverlay').classList.contains('open') && curRoom) refreshModal(curRoom.id);
}
function toggleLangDropdown() { document.getElementById('langSelector').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('langSelector').contains(e.target)) document.getElementById('langSelector').classList.remove('open'); });

function renderFilters() {
  document.getElementById('filterBar').innerHTML = filterCats.map((c,i) =>
    `<button class="filter-btn ${filter===c?'active':''}" onclick="applyFilter('${c}',this)">${filterLabels[lang][i]}</button>`
  ).join('');
}
function applyFilter(c, btn) {
  filter = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function renderCards() {
  const u = UI[lang];
  const list = filter === 'all' || filter === filterCats[0] ? rooms : rooms.filter(r => r.category === filter);
  document.getElementById('grid').innerHTML = list.map(r => {
    const t = r.t[lang];
    const snippet = t.description.replace(/\n/g,' ').slice(0,160)+'…';
    return `<div class="card" onclick="openModal(${r.id})">
      <div class="card-img">
        <img src="${r.img}" alt="${t.title}" loading="lazy">
        <div class="card-era">${r.era}</div>
        <div class="audio-badge"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-location">${t.location}</div>
        <div class="card-title">${t.title}</div>
        <div class="card-text">${snippet}</div>
      </div>
      <div class="card-footer">
        <span class="card-duration">⏱ ${r.duration[lang]}</span>
        <button class="btn-listen">${u.listenBtn}</button>
      </div>
    </div>`;
  }).join('');
}
function openModal(id) {
  curRoom = rooms.find(x => x.id === id);
  if (!curRoom) return;
  stopAudio(); refreshModal(id); setupAudio();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({ modal: id }, '');
}
function refreshModal(id) {
  const r = rooms.find(x => x.id === id);
  const t = r.t[lang]; const u = UI[lang];
  document.getElementById('modalImg').src = r.img;
  document.getElementById('modalImg').alt = t.title;
  document.getElementById('modalEra').textContent = r.era;
  document.getElementById('modalLoc').textContent = t.location;
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalDesc').innerHTML = t.description.replace(/\n\n/g,'</p><p style="margin-top:12px">');
  document.getElementById('playerLabel').textContent = u.playerLabel;
  document.getElementById('langPillFlag').textContent = u.flag;
  document.getElementById('langPillText').textContent = u.langName;
  document.getElementById('totalTime').textContent = r.duration[lang];
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
}
function setupAudio() {
  const src = curRoom.audio[lang];
  if (src) {
    curAudio = new Audio(src);
    curAudio.volume = parseFloat(document.getElementById('volumeSlider').value);
    curAudio.addEventListener('timeupdate', updateProgress);
    curAudio.addEventListener('ended', () => { playing=false; updatePlayIcon(); document.getElementById('progressFill').style.width='0%'; document.getElementById('currentTime').textContent='0:00'; });
    curAudio.addEventListener('loadedmetadata', () => { document.getElementById('totalTime').textContent = fmt(curAudio.duration); });
  } else { curAudio = null; }
}
function closeModal(e) { if (e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  stopAudio(); curRoom = null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (history.state && history.state.modal) history.back();
}
function closeModalNoHistory() {
  stopAudio(); curRoom = null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function togglePlay() { if(!curAudio){alert(UI[lang].noAudio);return;} if(playing){curAudio.pause();playing=false;}else{curAudio.play();playing=true;} updatePlayIcon(); }
function stopAudio() { if(curAudio){curAudio.pause();curAudio.currentTime=0;} playing=false; updatePlayIcon(); }
function updatePlayIcon() {
  const icon=document.getElementById('playIcon'), btn=document.getElementById('playBtn');
  if(playing){icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';btn.classList.add('playing');}
  else{icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';btn.classList.remove('playing');}
}
function updateProgress() { if(!curAudio)return; document.getElementById('progressFill').style.width=(curAudio.currentTime/curAudio.duration*100)+'%'; document.getElementById('currentTime').textContent=fmt(curAudio.currentTime); }
function seekAudio(e) { if(!curAudio||!curAudio.duration)return; const r=document.getElementById('progressBar').getBoundingClientRect(); curAudio.currentTime=((e.clientX-r.left)/r.width)*curAudio.duration; }
function setVolume(v) { if(curAudio)curAudio.volume=parseFloat(v); }
document.addEventListener('keydown', e => {
  if(e.key==='Escape')closeModalDirect();
  if(e.key===' '&&document.getElementById('modalOverlay').classList.contains('open')){e.preventDefault();togglePlay();}
});
 window.addEventListener('popstate', () => {
  if (document.getElementById('modalOverlay').classList.contains('open')) closeModalNoHistory();
});
setLanguage('it');
</script>
