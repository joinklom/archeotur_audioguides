const filterCats = ["costruzione","storia"];
const filterLabels = {it:["Tutti","Struttura","Storia"],en:["All","Structure","History"],fr:["Tous","Structure","Histoire"],de:["Alle","Struktur","Geschichte"],};
const rooms = [
  {id:1,era:"Costruzione",category:"struttura",img:"./assets/forte.jpg",duration:{it:"4:00",en:"3:55",fr:"4:08",de:"4:15"},audio:{it:null,en:null,fr:null,de:null},t:{
    it:{title:"La Struttura",location:"Perimetro esterno",description:"Sulla cima della collina che domina la basilica di Sant’Antioco e sovrasta tutt’attorno la necropoli punica dell’antica Sulky, si trova il Forte Sabaudo o “su pisu”. La struttura militare a cielo aperto fu costruita tra il 1813 e il 1815, in pieno periodo sabaudo. A causa delle continue incursioni dei corsari barbareschi le autorità di Sant’Antioco alla fine del settecento predisposero un piano difensivo che prevedeva la costruzione di un piccolo forte all’ingresso dell’isola, nei pressi del ponte romano.<br><br>Il 22 luglio del 1812 una flotta tunisina approdò nel Golfo di Palmas e i corsari sbarcarono espugnando il fortino e facendo numerosi prigionieri. La popolazione di Sant’Antioco, delusa per la facilità con cui i corsari avevano invaso l’isola, protestò nei confronti del vicerè minacciando l’esodo. Si decise, perciò, di realizzare una nuova fortificazione più vicina al villaggio. I fondi per la costruzione vennero raccolti con una divisione di tasse per ceto sociale e con i finanziamenti del governo.<br>Il progetto fu redatto dall’ufficiale tedesco Ambrogio Capson. Il sito individuato per l’edificazione fu la cima della collina chiamata “Sa guardia de su pisu”. La scelta fu probabilmente motivata da diversi elementi. Vista la scarsità dei fondi per la costruzione si approffittò di strutture militari di epoche precedenti: un nuraghe polilobato a tre torri del 1500 avanti Cristo, e le fortificazioni puniche del 379 avanti Cristo che passavano, come è possibile vedere dai grossi massi di trachite rossa sistemati alla base del forte, Inoltre da quella posizione il forte con i suoi cannoni avrebbe protetto la chiesa di Sant’Antioco e il villaggio costruito attorno ad essa.<br><br>Nel febbraio del 1813 iniziarono i lavori che proseguirono con alterne vicende per due anni. La scala originaria era addossata alla parete ed era in pietra. L’arcata dell’ingresso e i fori presenti al di sopra fanno capire come nel progetto iniziale fosse previsto un ponte levatoio. A destra in alto si vedono le feritoie della garitta occluse forse durante il restauro. La fortificazione non avevaalloggi per i soldati, ma solo il commodo per la ronda che terminava il turno di guardia. Quattro soldati a turno vegliavano sulla popolazione effettuando la ronda lungo il camminamento del forte. In caso di avvistamento davano l’allarme richiamando soldati e civili all’interno del bastione per l’estrema difesa.<br>Al centro della piazza d’armi fu costruita una “Santa Barbara” dove conservare le munizioni e la polvere da sparo. Ai lati del fortino si trovano alcune piccole feritoie per i fucili e tre più grandi per i cannoni.<br><br>Un giovane sottotenente di trent’anni, appena diplomato all’accademia militare, venne scelto per il comando delle truppe a difesa del paese. Efisio Melis Alagna ricevette così un incarico di grande responsabilità in un territorio di frontiera. Il comandante doveva mporre l’autorità agli Artiglieri di Sardegna che aveva ai suoi ordini, assecondare le richieste degli esperti Miliziani, volontari di Sant’Antioco che mettevano la divisa in caso di grave pericolo, e addestrare giovani del villaggio arruolati per utilizzare i cannoni ma non abituati alla disciplina militare.<br>I rapporti con le autorità civili, ecclesiastiche, e con la popolazione non furono totalmente collaborativi, come si può constatare dalle delibere comunali."},
    en:{title:"The Structure",location:"Outer perimeter",description:"On the summit of the hill overlooking the Basilica of Sant’Antioco and dominating the Punic necropolis of ancient Sulky, stands the Savoy Fortress, known locally as “Su Pisu.” This open-air military structure was built between 1813 and 1815, during the Savoy period. <br>Due to the continuous raids of Barbary corsairs, the authorities of Sant’Antioco developed a defensive plan at the end of the eighteenth century. The plan called for the construction of a small fort at the entrance to the island, near the Roman bridge.<br><br>On July 22, 1812, a Tunisian fleet landed in the Gulf of Palmas. The corsairs captured the fort and took numerous prisoners. Disappointed by the ease with which the corsairs had invaded the island, the inhabitants of Sant’Antioco protested to the Viceroy and threatened to abandon the settlement.<br>As a result, it was decided to build a new fortification closer to the village. Funds were raised through taxes levied according to social class and through government contributions. The project was designed by the German officer Ambrogio Capson.<br>The chosen site was the top of the hill known as “Sa Guardia de Su Pisu.” Several factors probably influenced this decision. Because of limited funds, existing military structures from earlier periods were incorporated into the project: a three-towered Bronze Age nuraghe dating to around 1500 BC and Punic fortifications dating to 379 BC, traces of which can still be seen in the large blocks of red trachyte at the base of the fortress.<br>From this strategic position, the fort and its cannons could protect both the Basilica of Sant’Antioco and the village surrounding it.<br><br>Construction began in February 1813 and continued, with various interruptions, for two years. The original staircase was attached to the wall and built of stone. The entrance arch and the openings above it suggest that the original design included a drawbridge.<br>At the upper right side of the structure, one can still see the loopholes of the sentry box, possibly sealed during restoration work.<br>The fortress contained no permanent barracks for soldiers, only accommodation for the guards completing their watch. Four soldiers at a time patrolled the walls and kept watch over the population. In the event of an enemy sighting, they would sound the alarm, calling both soldiers and civilians into the bastion for a last stand.<br>At the center of the parade ground stood a powder magazine, known as the “Santa Barbara,” where ammunition and gunpowder were stored. Along the sides of the fort are small loopholes for muskets and three larger embrasures for cannons.<br><br>A young thirty-year-old second lieutenant, recently graduated from the military academy, was chosen to command the troops defending the village. Efisio Melis Alagna was thus entrusted with a position of great responsibility in a frontier territory.<br>The commander had to maintain authority over the Sardinian artillerymen under his command, cooperate with the experienced militiamen—volunteers from Sant’Antioco who took up arms in times of danger—and train local young recruits to operate the cannons despite their lack of military discipline.<br>Relations with the civil authorities, the Church, and the local population were not always harmonious, as municipal records clearly demonstrate."},
    fr:{title:"La Structure",location:"Périmètre extérieur",description:"Au sommet de la colline qui domine la basilique de Sant’Antioco et surplombe la nécropole punique de l’ancienne Sulky se dresse le Fort Savoyard, appelé localement « Su Pisu ». Cette fortification militaire à ciel ouvert fut construite entre 1813 et 1815, durant la période savoyarde.<br>En raison des incursions continuelles des corsaires barbaresques, les autorités de Sant’Antioco élaborèrent à la fin du XVIIIe siècle un plan de défense prévoyant la construction d’un petit fort à l’entrée de l’île, près du pont romain.<br><br>Le 22 juillet 1812, une flotte tunisienne débarqua dans le golfe de Palmas. Les corsaires s’emparèrent du fortin et firent de nombreux prisonniers. Déçue par la facilité avec laquelle l’île avait été envahie, la population protesta auprès du vice-roi et menaça d’abandonner le village.<br><br>Il fut alors décidé de construire une nouvelle fortification plus proche du centre habité. Les fonds furent réunis grâce à un système d’imposition réparti selon les classes sociales et à des financements gouvernementaux. Le projet fut confié à l’officier allemand Ambrogio Capson.<br><br>Le site choisi était le sommet de la colline appelée « Sa Guardia de Su Pisu ». Ce choix fut probablement motivé par plusieurs raisons. Compte tenu du manque de ressources, on réutilisa des structures militaires plus anciennes : un nuraghe trilobé datant d’environ 1500 av. J.-C. ainsi que des fortifications puniques remontant à 379 av. J.-C., dont on peut encore observer les vestiges dans les grands blocs de trachyte rouge à la base du fort.<br><br>Grâce à sa position dominante, le fort et son artillerie pouvaient protéger la basilique de Sant’Antioco ainsi que le village construit autour d’elle.<br><br>Les travaux commencèrent en février 1813 et se poursuivirent, avec diverses interruptions, pendant deux ans. L’escalier d’origine, en pierre, était adossé au mur. L’arc d’entrée et les ouvertures visibles au-dessus indiquent que le projet initial prévoyait probablement un pont-levis.<br>Dans la partie supérieure droite, on distingue encore les meurtrières de la guérite, probablement murées lors d’une restauration.<br>La fortification ne disposait pas de casernements permanents mais uniquement de locaux destinés aux soldats terminant leur tour de garde. Quatre soldats assuraient en permanence la surveillance de la population en patrouillant sur le chemin de ronde. En cas de menace, ils donnaient l’alerte et rassemblaient soldats et civils à l’intérieur du bastion pour une défense ultime.<br>Au centre de la place d’armes fut construite une poudrière, appelée « Santa Barbara », destinée au stockage des munitions et de la poudre. Les côtés du fort comportent de petites meurtrières pour les fusils ainsi que trois embrasures plus grandes pour les canons.<br><br>Un jeune sous-lieutenant de trente ans, récemment diplômé de l’académie militaire, fut choisi pour commander les troupes chargées de défendre le village. Efisio Melis Alagna reçut ainsi une mission d’une grande responsabilité dans un territoire frontalier.<br>Le commandant devait imposer son autorité aux artilleurs sardes placés sous ses ordres, collaborer avec les miliciens expérimentés de Sant’Antioco et former les jeunes recrues locales à l’utilisation des canons malgré leur manque d’expérience militaire.<br>Les relations avec les autorités civiles, religieuses et avec la population ne furent pas toujours harmonieuses, comme en témoignent les délibérations municipales."},
    de:{title:"Die Struktur",location:"Äußerer Perimeter",description:"Auf dem Gipfel des Hügels, der die Basilika von Sant’Antioco überragt und die punische Nekropole des antiken Sulky beherrscht, befindet sich das Savoyische Fort, im Volksmund „Su Pisu“ genannt. Die offene militärische Anlage wurde zwischen 1813 und 1815 während der savoyischen Herrschaft errichtet.<br>Aufgrund der ständigen Überfälle der Barbaresken-Korsaren entwickelten die Behörden von Sant’Antioco gegen Ende des 18. Jahrhunderts einen Verteidigungsplan. Dieser sah den Bau eines kleinen Forts am Eingang der Insel in der Nähe der römischen Brücke vor.<br><br>Am 22. Juli 1812 landete eine tunesische Flotte im Golf von Palmas. Die Korsaren eroberten das Fort und nahmen zahlreiche Gefangene. <br>Enttäuscht darüber, wie leicht die Insel überfallen worden war, protestierte die Bevölkerung von Sant’Antioco beim Vizekönig und drohte mit der Auswanderung.<br><br>Daraufhin wurde beschlossen, eine neue Befestigungsanlage näher am Dorf zu errichten. Die Baukosten wurden durch nach sozialen Klassen gestaffelte Steuern sowie durch staatliche Zuschüsse finanziert. Der Entwurf stammte von dem deutschen Offizier Ambrogio Capson.<br>Als Standort wurde der Hügel „Sa Guardia de Su Pisu“ ausgewählt. Diese Entscheidung beruhte vermutlich auf mehreren Faktoren. Aufgrund der begrenzten finanziellen Mittel nutzte man bereits vorhandene Verteidigungsanlagen: einen dreitürmigen Nuraghen aus etwa 1500 v. Chr. sowie punische Befestigungen aus dem Jahr 379 v. Chr., deren Überreste noch heute in den großen Blöcken aus rotem Trachyt am Fuß des Forts zu erkennen sind.<br>Von dieser strategischen Position aus konnten das Fort und seine Kanonen sowohl die Basilika von Sant’Antioco als auch das umliegende Dorf schützen.<br>Die Bauarbeiten begannen im Februar 1813 und dauerten mit Unterbrechungen zwei Jahre. Die ursprüngliche Treppe war aus Stein gefertigt und direkt an die Mauer angebaut. Der Eingangsbogen und die darüber befindlichen Öffnungen lassen darauf schließen, dass ursprünglich eine Zugbrücke vorgesehen war.<br><br>Oben rechts sind noch die Schießscharten des Wachhäuschens zu erkennen, die möglicherweise bei Restaurierungsarbeiten verschlossen wurden.<br>Die Festung verfügte über keine dauerhaften Unterkünfte für die Soldaten, sondern lediglich über Räume für die Wachmannschaften nach ihrem Dienst. Vier Soldaten gleichzeitig überwachten die Bevölkerung und patrouillierten entlang des Wehrgangs. Bei Gefahr schlugen sie Alarm und riefen Soldaten sowie Zivilisten zur letzten Verteidigung in die Festung.<br>In der Mitte des Exerzierplatzes befand sich eine Pulverkammer, die sogenannte „Santa Barbara“, in der Munition und Schießpulver gelagert wurden. An den Seiten der Festung befinden sich kleine Schießscharten für Gewehre sowie drei größere Öffnungen für Kanonen.<br><br>Ein dreißigjähriger Leutnant, frisch von der Militärakademie ausgebildet, wurde mit dem Kommando über die Verteidigung des Dorfes betraut. Efisio Melis Alagna erhielt damit eine äußerst verantwortungsvolle Aufgabe in einem Grenzgebiet.<br>Der Kommandant musste seine Autorität gegenüber den sardischen Artilleristen durchsetzen, mit den erfahrenen Milizionären von Sant’Antioco zusammenarbeiten und junge Dorfbewohner im Umgang mit den Kanonen ausbilden, obwohl diese kaum an militärische Disziplin gewöhnt waren.<br>Die Beziehungen zu den zivilen Behörden, zur Kirche und zur Bevölkerung verliefen nicht immer reibungslos, wie die Gemeinderatsprotokolle belegen."},}},
  {id:2,era:"Storia",category:"Storia",img:"https://images.unsplash.com/photo-1558618047-3c8c76ca7d13?w=800&q=80",duration:{it:"3:30",en:"3:25",fr:"3:38",de:"3:42"},audio:{it:null,en:null,fr:null,de:null},t:{
    it:{title:"La Battaglia",location:"Corpo centrale",description:"Nell’ottobre del 1815 si ebbero le prime avvisaglie di una possibile incursione nel sud della Sardegna. I corsari tunisini tentarono uno sbarco nell’isola di San Pietro ma furono avvistati in tempo dalle forze carlofortine. I barbareschi, non potendo contare sul fattore sorpresa, decisero di cambiare obiettivo e puntarono verso l’isola di Sant’Antioco.<br>Gli invasori sbarcarono una prima volta nella parte occidentale dell’isola, in località Calalunga, e fecero razzia di bestiame. Il capitano dei miliziani, già distintosi nel 1813 nella difesa della tonnara di Calasapone, preoccupato per l’incursione, tornò in paese e chiese al sottotenente Alagna di preparare la difesa della città.<br><br>Domenica 15 ottobre, al tramonto, comparve davanti alle coste dell’isola di Sant’Antioco una flotta che mise in allarme tutta la popolazione, ben presto rassicurata poiché le navi battevano bandiera inglese. Il tenente Alagna, non pensando a un inganno dei tunisini, si dimenticò dell’avvertimento ricevuto e non proclamò lo stato di emergenza.<br>Alle sette del mattino del giorno successivo circa mille corsari, a bordo delle loro scialuppe, presero d’assalto le spiagge di Is Pruinis e di Sa Punta de S’Àliga. Da questi luoghi si diressero verso il centro abitato, aggirando il paese dalla parte occidentale ed evitando così di cadere sotto la portata di fuoco dei cannoni collocati nel vecchio fortino del ponte.<br>Gli abitanti dell’isola si diedero alla fuga verso le campagne mettendo in salvo donne e bambini. Il comandante, insieme ai suoi soldati e ai miliziani, tentò di sostenere l’urto nemico alla periferia del paese per agevolare la fuga degli abitanti, ma fu costretto a ripiegare a causa dell’eccessivo numero di assalitori e si rifugiò con i suoi uomini nel forte Su Pisu.<br><br>Prima che i lavori del forte cominciassero, le case del villaggio si erano progressivamente estese sino al nuraghe e alla roccaforte punica. In questo modo, al momento dell’attacco, le mura del forte si trovavano quasi a contatto con le abitazioni.<br>Nonostante tutto, sia i militari sia i civili ritenevano che il forte fosse inespugnabile. La guarnigione presente al momento dell’assalto era composta da circa venticinque uomini tra artiglieri, miliziani e cannonieri. Nella fortificazione trovarono rifugio anche alcuni cittadini.<br><br>Quando il comandante tunisino giunse ai piedi della roccaforte con il suo esercito, ordinò l’assalto. I difensori opposero inizialmente una resistenza accanita ed efficace. Gli attacchi continuarono per circa sette ore e il forte sembrava davvero impossibile da espugnare.<br>I tunisini erano ormai vicini a esaurire le munizioni, ma riuscirono comunque a proseguire l’assalto. Durante la ritirata, il tenente Alagna non aveva avuto il tempo di recuperare le armi e le munizioni custodite nella propria abitazione. I tunisini se ne impossessarono e le utilizzarono per continuare l’attacco.<br>A questo punto il comandante tunisino adottò una strategia che si rivelò decisiva. La maggior parte dei suoi uomini concentrò gli attacchi sul lato nord-occidentale della fortificazione, attirando i difensori in quel settore. Nel frattempo, un altro gruppo approfittò della mancanza di difensori sul lato orientale ed entrò nel forte utilizzando il telaio di un carro per salire sul tetto di un magazzino addossato alla fortificazione.<br>Sfruttando l’effetto sorpresa, gli assalitori attaccarono la roccaforte dall’interno e circondarono le esigue forze poste a difesa della struttura. Il tenente Alagna e dieci dei suoi uomini rimasero uccisi nello scontro. I soldati sopravvissuti e i civili rifugiati nel forte furono costretti ad arrendersi.<br><br>Furono circa centotrenta le persone catturate dai corsari barbareschi, tra le quali vi era anche la sorella di Alagna. Le trattative per la liberazione dei prigionieri durarono sei mesi e si conclusero con il pagamento di un riscatto e il ritorno in patria dei sequestrati.<br>Il comandante Efisio Melis Alagna fu inizialmente sepolto nel cimitero del villaggio. Successivamente, con l’autorizzazione del vescovo, la salma venne riesumata e trasferita nella basilica di Sant’Antioco, dove una lapide ne onorò la memoria.<br>A ricordo di quel tragico avvenimento venne inoltre collocata una targa commemorativa con i nomi di coloro che sacrificarono la propria vita per la difesa del paese e dei suoi abitanti.<br>Le informazioni relative all’assalto del 1815, conservate nell’Archivio Storico Comunale di Sant’Antioco, derivano in gran parte dalle testimonianze dei soldati sopravvissuti, che poterono raccontare gli eventi una volta rientrati dalla prigionia.<br><br>L’incursione di Sant’Antioco suscitò la reazione delle potenze europee, in particolare dell’Inghilterra, desiderosa di rafforzare la propria influenza nel Mediterraneo. L’ammiraglio Lord Exmouth fu inviato come mediatore presso le reggenze nordafricane di Tunisi, Tripoli e Algeri.<br>L’ammiraglio presentò un ultimatum, chiedendo la libertà reciproca di commercio, l’ammissione di consoli sardi nei territori africani e l’abolizione della schiavitù in Nord Africa.<br>Il Bey di Algeri chiese sei mesi di tempo per consultare l’Impero Ottomano, che manteneva ancora nominalmente la sovranità sulla regione. Questa giustificazione non convinse le potenze europee. Inghilterra e Paesi Bassi risposero bombardando Algeri.<br>Sopraffatta dall’attacco, Algeri accettò le condizioni imposte. Tutti gli schiavi ancora detenuti in Nord Africa furono liberati. Migliaia di uomini, donne e bambini provenienti da ogni parte del Mediterraneo poterono finalmente fare ritorno alle proprie case dopo anni di prigionia.<br>In seguito a questo episodio, il governo sabaudo inviò un consistente contingente militare a difesa dell’isola e poco tempo dopo il Regno di Sardegna concluse anche un accordo di non belligeranza con il Bey di Tunisi.<br>La presa di Sant’Antioco del 1815 rappresentò l’ultima grande incursione dei corsari barbareschi nel Mediterraneo."},
    en:{title:"The Battle",location:"Central building",description:"In October 1815, the first signs of a possible raid in southern Sardinia began to appear. Tunisian corsairs attempted to land on the island of San Pietro but were spotted in time by the defenders of Carloforte. Unable to rely on surprise, the Barbary corsairs changed their objective and turned toward the island of Sant’Antioco.<br>The invaders first landed on the western side of the island, at Calalunga, where they seized livestock. Concerned by the raid, the captain of the local militia—who had already distinguished himself during the defense of the tuna fishery at Calasapone in 1813—returned to the village and urged Lieutenant Alagna to prepare the town’s defenses.<br><br>On Sunday, October 15, at sunset, a fleet appeared off the coast of Sant’Antioco. The sight alarmed the population, but fears quickly subsided when it became apparent that the ships were flying British flags. Lieutenant Alagna, not suspecting a Tunisian deception, overlooked the warning he had received and failed to declare a state of emergency.<br At seven o’clock the following morning, about one thousand corsairs, travelling in longboats, launched an assault on the beaches of Is Pruinis and Sa Punta de S’Àliga. From there they advanced toward the village, approaching from the west and thus avoiding the range of the cannons positioned at the old fort near the bridge.<br>The island’s inhabitants fled into the countryside, bringing women and children to safety. To cover their escape, the commander, together with his soldiers and militiamen, attempted to halt the enemy on the outskirts of the village. Faced with overwhelming numbers, however, they were forced to retreat and took refuge in the fortress of Su Pisu.<br><br>Before construction of the fortress had begun, the village had gradually expanded toward the ancient nuraghe and Punic stronghold. As a result, at the time of the attack the walls of the fort stood almost directly adjacent to the houses.<br> Despite the danger, both soldiers and civilians believed the fortress to be impregnable. The garrison consisted of approximately twenty-five men, including artillerymen, militiamen, and gunners. Several civilians also sought shelter inside the fort.<br><br>When the Tunisian commander arrived at the foot of the stronghold with his forces, he ordered an assault. The defenders initially resisted fiercely and effectively. The attacks continued for approximately seven hours, and the fortress seemed impossible to capture.<br>The Tunisian attackers were close to running out of ammunition, yet they managed to continue the assault. During his retreat, Lieutenant Alagna had not had time to recover the weapons and ammunition stored in his home. The Tunisians seized them and used them to sustain their attack.<br>At this point, the Tunisian commander adopted a strategy that proved decisive. Most of his men concentrated their assaults on the northwestern side of the fortress, drawing the defenders to that sector. Meanwhile, another group took advantage of the lack of defenders on the eastern side and entered the fort by using the frame of a cart to climb onto the roof of a warehouse attached to the fortification.<br>Benefiting from surprise, the attackers stormed the stronghold from within and surrounded the small defending force. Lieutenant Alagna and ten of his men were killed in the fighting. The surviving soldiers and civilians were forced to surrender.<br><brApproximately one hundred and thirty people were captured by the Barbary corsairs, including Alagna’s sister. Negotiations for the prisoners’ release lasted six months, ending with the payment of a ransom and the safe return of the captives.<br>Commander Efisio Melis Alagna was initially buried in the village cemetery. Later, with authorization from the Bishop, his remains were exhumed and transferred to the Basilica of Sant’Antioco, where a Latin inscription was dedicated to his memory.<br>To commemorate the tragic event, a memorial plaque was installed bearing the names of those who gave their lives defending the village and its people.<br>The information concerning the assault of 1815, preserved in the Historical Municipal Archive of Sant’Antioco, comes largely from the testimonies of the surviving soldiers, who were able to report the events after returning from captivity.<br><br>The attack on Sant’Antioco provoked a reaction from the European powers, particularly Great Britain, which sought to strengthen its influence in the Mediterranean. Admiral Lord Exmouth was sent as a mediator, representing both the King of Sardinia and the Kingdom of the Two Sicilies. At the head of a large fleet, he confronted the North African regencies of Tunis, Tripoli, and Algiers.<br>The admiral issued an ultimatum demanding the acceptance of several conditions: mutual freedom of trade, the admission of Sardinian consuls into North African territories, and the abolition of slavery in North Africa.<br>The Bey of Algiers requested six months to consult the Ottoman Empire, which still nominally exercised authority in the region. This explanation failed to satisfy the European powers. Great Britain and the Netherlands responded by bombarding Algiers.<br>Overwhelmed by the attack, Algiers accepted the proposed conditions. All remaining slaves held in North Africa were released. Thousands of men, women, and children from across the Mediterranean were finally able to return home after years of captivity.<br>Following this serious episode, the Savoy government dispatched a substantial military contingent to defend the island. Shortly afterward, the Kingdom of Sardinia also concluded a non-aggression agreement with the Bey of Tunis.<br>The capture of Sant’Antioco in 1815 marked the last major Barbary corsair raid in the Mediterranean."},
    fr:{title:"La Bataille",location:"Bâtiment central",description:"En octobre 1815 apparurent les premiers signes d’une possible attaque contre le sud de la Sardaigne. Des corsaires tunisiens tentèrent un débarquement sur l’île de San Pietro, mais ils furent repérés à temps par les défenseurs de Carloforte. Privés de l’effet de surprise, les corsaires barbaresques changèrent d’objectif et se dirigèrent vers l’île de Sant’Antioco.<br>Les envahisseurs débarquèrent d’abord sur la côte occidentale de l’île, à Calalunga, où ils s’emparèrent de bétail. Inquiet de cette incursion, le capitaine de la milice locale, déjà distingué lors de la défense de la tonnara de Calasapone en 1813, retourna au village et demanda au sous-lieutenant Alagna de préparer la défense de la ville.<br><br>Le dimanche 15 octobre, au coucher du soleil, une flotte apparut au large de Sant’Antioco. La population fut alarmée, mais rapidement rassurée en constatant que les navires arboraient le pavillon britannique. Le sous-lieutenant Alagna, ne soupçonnant pas une ruse tunisienne, négligea l’avertissement reçu et ne proclama pas l’état d’urgence.<br>À sept heures du matin le lendemain, environ mille corsaires, à bord de leurs chaloupes, attaquèrent les plages d’Is Pruinis et de Sa Punta de S’Àliga. Ils marchèrent ensuite vers le village en le contournant par l’ouest afin d’éviter le tir des canons du vieux fort près du pont.<br>Les habitants s’enfuirent vers la campagne, mettant femmes et enfants à l’abri. Pour couvrir leur retraite, le commandant, ses soldats et les miliciens tentèrent de résister à la périphérie du village. Face au nombre écrasant des assaillants, ils furent contraints de se replier dans le fort de Su Pisu.<br><br>Avant la construction de la forteresse, le village s’était progressivement étendu jusqu’au nuraghe antique et à la forteresse punique. Ainsi, au moment de l’attaque, les murs du fort se trouvaient presque au contact direct des habitations.<br>Malgré le danger, soldats et civils considéraient la forteresse comme imprenable. La garnison comptait environ vingt-cinq hommes, parmi lesquels des artilleurs, des miliciens et des canonniers. Plusieurs habitants trouvèrent également refuge à l’intérieur du fort.<br><br>Lorsque le commandant tunisien arriva au pied de la forteresse avec ses troupes, il ordonna l’assaut. Les défenseurs opposèrent d’abord une résistance acharnée et efficace. Les attaques se poursuivirent pendant environ sept heures et la forteresse semblait impossible à prendre.<br>Les assaillants tunisiens étaient presque à court de munitions, mais ils réussirent néanmoins à poursuivre l’attaque. Lors de sa retraite, le sous-lieutenant Alagna n’avait pas eu le temps de récupérer les armes et les munitions conservées dans sa maison. Les Tunisiens s’en emparèrent et les utilisèrent pour poursuivre l’assaut.<br>À ce stade, le commandant tunisien adopta une stratégie qui se révéla décisive. La majorité de ses hommes concentra ses attaques sur le côté nord-ouest de la forteresse, attirant les défenseurs dans ce secteur. Pendant ce temps, un autre groupe profita de l’absence de défenseurs du côté oriental pour pénétrer dans le fort en utilisant le châssis d’une charrette afin d’escalader le toit d’un entrepôt adossé à la fortification.<br>Profitant de l’effet de surprise, les assaillants attaquèrent la forteresse de l’intérieur et encerclèrent les faibles forces chargées de sa défense. Le sous-lieutenant Alagna et dix de ses hommes furent tués au combat. Les soldats survivants et les civils réfugiés dans le fort furent contraints de se rendre.<br><br>Environ cent trente personnes furent capturées par les corsaires barbaresques, parmi lesquelles se trouvait la sœur d’Alagna. Après six mois de négociations, une rançon fut versée et les prisonniers purent rentrer chez eux.<br>L’officier Efisio Melis Alagna fut d’abord enterré dans le cimetière du village, puis transféré dans la basilique de Sant’Antioco où son souvenir fut honoré par une inscription.<br>Une plaque commémorative fut également installée afin de rappeler le sacrifice de ceux qui donnèrent leur vie pour défendre le village et ses habitants.<br>Les témoignages des soldats survivants, conservés dans les archives historiques municipales, constituent aujourd’hui la principale source d’information sur l’assaut de 1815.<br><br>L’attaque suscita une forte réaction des puissances européennes, notamment de la Grande-Bretagne. L’amiral Lord Exmouth fut envoyé comme médiateur auprès de Tunis, Tripoli et Alger.<br>Il présenta un ultimatum exigeant la liberté réciproque du commerce, l’admission de consuls sardes dans les territoires nord-africains et l’abolition de l’esclavage en Afrique du Nord.<br>Le Bey d’Alger demanda six mois pour consulter l’Empire ottoman, qui exerçait encore nominalement son autorité sur la région. Cette explication ne convainquit pas les puissances européennes. La Grande-Bretagne et les Pays-Bas bombardèrent alors Alger.<br>Submergée par l’attaque, Alger accepta les conditions imposées. Tous les esclaves encore détenus en Afrique du Nord furent libérés. Des milliers d’hommes, de femmes et d’enfants provenant de tout le bassin méditerranéen purent enfin rentrer chez eux après des années de captivité.<br>À la suite de cet épisode, le gouvernement savoyard renforça la défense de l’île et conclut peu après un accord de non-agression avec le Bey de Tunis.<br>La prise de Sant’Antioco en 1815 marqua la dernière grande incursion des corsaires barbaresques en Méditerranée."},
    de:{title:"Die Schlacht",location:"Zentralgebäude",description:"Im Oktober 1815 zeigten sich die ersten Anzeichen eines möglichen Angriffs auf den Süden Sardiniens. Tunesische Korsaren versuchten auf der Insel San Pietro zu landen, wurden jedoch rechtzeitig von den Verteidigern von Carloforte entdeckt. Da der Überraschungseffekt verloren war, änderten die Barbaresken ihr Ziel und richteten ihren Angriff auf die Insel Sant’Antioco.<br>Die Angreifer landeten zunächst an der Westküste der Insel bei Calalunga und raubten Vieh. Der Hauptmann der Miliz, der sich bereits 1813 bei der Verteidigung der Thunfischfanganlage von Calasapone ausgezeichnet hatte, kehrte daraufhin ins Dorf zurück und forderte Leutnant Alagna auf, die Verteidigung vorzubereiten.<br><br>Am Sonntag, dem 15. Oktober, erschien bei Sonnenuntergang eine Flotte vor der Küste von Sant’Antioco. Die Bevölkerung geriet zunächst in Alarmbereitschaft, beruhigte sich jedoch wieder, als die Schiffe unter britischer Flagge zu fahren schienen. Leutnant Alagna vermutete keine Täuschung und rief deshalb keinen Ausnahmezustand aus.<br>Am nächsten Morgen um sieben Uhr griffen etwa eintausend Korsaren mit ihren Booten die Strände von Is Pruinis und Sa Punta de S’Àliga an. Von dort rückten sie auf das Dorf vor und umgingen es von Westen, wodurch sie der Reichweite der Kanonen des alten Forts an der Brücke entgingen.<br>Die Bewohner flohen aufs Land und brachten Frauen und Kinder in Sicherheit. Um ihren Rückzug zu decken, versuchten der Kommandant, seine Soldaten und die Milizionäre, den Feind am Rand des Dorfes aufzuhalten. Angesichts der zahlenmäßigen Überlegenheit der Angreifer mussten sie sich jedoch in das Fort Su Pisu zurückziehen.<br><br>Vor dem Bau der Festung hatte sich das Dorf allmählich bis zum antiken Nuraghen und zur punischen Befestigung ausgedehnt. Dadurch befanden sich die Mauern des Forts zum Zeitpunkt des Angriffs beinahe direkt neben den Wohnhäusern.<br>Trotz der Gefahr hielten sowohl Soldaten als auch Zivilisten die Festung für uneinnehmbar. Die Garnison bestand aus etwa fünfundzwanzig Männern, darunter Artilleristen, Milizionäre und Kanoniere. Auch mehrere Dorfbewohner suchten innerhalb der Festung Schutz.<br><br>Als der tunesische Kommandant mit seinen Truppen am Fuß der Festung eintraf, befahl er den Angriff. Die Verteidiger leisteten zunächst erbitterten und wirksamen Widerstand. Die Angriffe dauerten etwa sieben Stunden, und die Festung schien uneinnehmbar zu sein.<br>Den tunesischen Angreifern ging die Munition beinahe aus, dennoch setzten sie ihren Angriff fort. Während des Rückzugs hatte Leutnant Alagna keine Zeit gehabt, die Waffen und die Munition aus seinem Haus mitzunehmen. Die Tunesier bemächtigten sich dieser Vorräte und nutzten sie für ihren weiteren Angriff.<br>An diesem Punkt wandte der tunesische Kommandant eine Strategie an, die sich als entscheidend erweisen sollte. Der Großteil seiner Männer konzentrierte die Angriffe auf die Nordwestseite der Festung und zog die Verteidiger in diesen Bereich. Gleichzeitig nutzte eine andere Gruppe die fehlende Bewachung der Ostseite aus und drang in die Festung ein, indem sie das Gestell eines Wagens benutzte, um auf das Dach eines an die Festung angebauten Lagerhauses zu gelangen.<br>Durch den Überraschungseffekt begünstigt, stürmten die Angreifer die Festung von innen und umzingelten die wenigen Verteidiger. Leutnant Alagna und zehn seiner Männer fielen im Kampf. Die überlebenden Soldaten sowie die Zivilisten innerhalb der Festung mussten kapitulieren.<br><br>Etwa 130 Menschen wurden von den Barbaresken-Korsaren gefangen genommen, darunter auch Alagnas Schwester. Nach sechs Monaten Verhandlungen wurde ein Lösegeld gezahlt, und die Gefangenen konnten in ihre Heimat zurückkehren.<br>Efisio Melis Alagna wurde zunächst auf dem Dorffriedhof beigesetzt. Später wurden seine sterblichen Überreste in die Basilika von Sant’Antioco überführt, wo ihm eine Gedenkinschrift gewidmet wurde.<br>Zur Erinnerung an das tragische Ereignis wurde außerdem eine Gedenktafel mit den Namen jener angebracht, die ihr Leben für die Verteidigung des Dorfes und seiner Bewohner opferten.<br>Die Berichte der überlebenden Soldaten, die heute im historischen Gemeindearchiv von Sant’Antioco aufbewahrt werden, bilden die wichtigste Quelle für die Ereignisse des Jahres 1815.<br><br>Der Angriff auf Sant’Antioco löste eine Reaktion der europäischen Mächte aus, insbesondere Großbritanniens. Admiral Lord Exmouth wurde als Vermittler nach Tunis, Tripolis und Algier entsandt.<br>Er stellte ein Ultimatum und forderte die gegenseitige Handelsfreiheit, die Zulassung sardischer Konsuln in Nordafrika sowie die Abschaffung der Sklaverei in Nordafrika.<br>Der Bey von Algier bat um sechs Monate Zeit, um das Osmanische Reich zu konsultieren, das zumindest nominell weiterhin die Oberhoheit über die Region innehatte. Diese Begründung überzeugte die europäischen Mächte nicht. Großbritannien und die Niederlande bombardierten daraufhin Algier.<br>Von den Angriffen überwältigt, akzeptierte Algier die geforderten Bedingungen. Alle noch in Nordafrika festgehaltenen Sklaven wurden freigelassen. Tausende Männer, Frauen und Kinder aus allen Teilen des Mittelmeerraums konnten nach Jahren der Gefangenschaft endlich in ihre Heimat zurückkehren.<br>Nach diesem Vorfall verstärkte die savoyische Regierung die militärische Verteidigung der Insel und schloss wenig später ein Nichtangriffsabkommen mit dem Bey von Tunis.<br>Die Eroberung von Sant’Antioco im Jahr 1815 gilt als der letzte große Überfall der Barbaresken-Korsaren im Mittelmeerraum."},}},
];


let lang = 'it', filter = 'all', curAudio = null, curRoom = null, playing = false;

function setLanguage(l) {
  lang = l;
  const u = UI[l];
  document.documentElement.lang = l;
  document.getElementById('currentFlag').textContent = u.flag;
  document.getElementById('currentLangLabel').textContent = l.toUpperCase();
  document.querySelectorAll('.lang-option').forEach(el => el.classList.toggle('active', el.dataset.lang === l));
  document.getElementById('langSelector').classList.remove('open');
  document.getElementById('headerSub').textContent = u.headerSub;
  document.getElementById('heroTag').textContent = u.heroTag;
  document.getElementById('heroTitle').innerHTML = u.heroTitle;
  document.getElementById('heroSubtitle').textContent = u.heroSubtitle;
  document.getElementById('footerCopy').textContent = u.footerCopy;
  renderFilters(); renderCards();
  if (document.getElementById('modalOverlay').classList.contains('open') && curRoom) refreshModal(curRoom.id);
}
function toggleLangDropdown() { document.getElementById('langSelector').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('langSelector').contains(e.target)) document.getElementById('langSelector').classList.remove('open'); });

function renderFilters() {
  document.getElementById('filterBar').innerHTML = filterCats.map((c,i) =>
    `<button class="filter-btn ${filter===c?'active':''}" onclick="applyFilter('${c}',this)">${filterLabels[lang][i]}</button>`
  ).join('');
}
function applyFilter(c, btn) {
  filter = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function renderCards() {
  const u = UI[lang];
  const list = filter === 'all' || filter === filterCats[0] ? rooms : rooms.filter(r => r.category === filter);
  document.getElementById('grid').innerHTML = list.map(r => {
    const t = r.t[lang];
    const snippet = t.description.replace(/\n/g,' ').slice(0,160)+'…';
    return `<div class="card" onclick="openModal(${r.id})">
      <div class="card-img">
        <img src="${r.img}" alt="${t.title}" loading="lazy">
        <div class="card-era">${r.era}</div>
        <div class="audio-badge"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-location">${t.location}</div>
        <div class="card-title">${t.title}</div>
        <div class="card-text">${snippet}</div>
      </div>
      <div class="card-footer">
        <span class="card-duration">⏱ ${r.duration[lang]}</span>
        <button class="btn-listen">${u.listenBtn}</button>
      </div>
    </div>`;
  }).join('');
}
function openModal(id) {
  curRoom = rooms.find(x => x.id === id);
  if (!curRoom) return;
  stopAudio(); refreshModal(id); setupAudio();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({ modal: id }, '');
}
function refreshModal(id) {
  const r = rooms.find(x => x.id === id);
  const t = r.t[lang]; const u = UI[lang];
  document.getElementById('modalImg').src = r.img;
  document.getElementById('modalImg').alt = t.title;
  document.getElementById('modalEra').textContent = r.era;
  document.getElementById('modalLoc').textContent = t.location;
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalDesc').innerHTML = t.description.replace(/\n\n/g,'</p><p style="margin-top:12px">');
  document.getElementById('playerLabel').textContent = u.playerLabel;
  document.getElementById('langPillFlag').textContent = u.flag;
  document.getElementById('langPillText').textContent = u.langName;
  document.getElementById('totalTime').textContent = r.duration[lang];
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
}
function setupAudio() {
  const src = curRoom.audio[lang];
  if (src) {
    curAudio = new Audio(src);
    curAudio.volume = parseFloat(document.getElementById('volumeSlider').value);
    curAudio.addEventListener('timeupdate', updateProgress);
    curAudio.addEventListener('ended', () => { playing=false; updatePlayIcon(); document.getElementById('progressFill').style.width='0%'; document.getElementById('currentTime').textContent='0:00'; });
    curAudio.addEventListener('loadedmetadata', () => { document.getElementById('totalTime').textContent = fmt(curAudio.duration); });
  } else { curAudio = null; }
}
function closeModal(e) { if (e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  stopAudio(); curRoom = null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (history.state && history.state.modal) history.back();
}
function closeModalNoHistory() {
  stopAudio(); curRoom = null;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function togglePlay() { if(!curAudio){alert(UI[lang].noAudio);return;} if(playing){curAudio.pause();playing=false;}else{curAudio.play();playing=true;} updatePlayIcon(); }
function stopAudio() { if(curAudio){curAudio.pause();curAudio.currentTime=0;} playing=false; updatePlayIcon(); }
function updatePlayIcon() {
  const icon=document.getElementById('playIcon'), btn=document.getElementById('playBtn');
  if(playing){icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';btn.classList.add('playing');}
  else{icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';btn.classList.remove('playing');}
}
function updateProgress() { if(!curAudio)return; document.getElementById('progressFill').style.width=(curAudio.currentTime/curAudio.duration*100)+'%'; document.getElementById('currentTime').textContent=fmt(curAudio.currentTime); }
function seekAudio(e) { if(!curAudio||!curAudio.duration)return; const r=document.getElementById('progressBar').getBoundingClientRect(); curAudio.currentTime=((e.clientX-r.left)/r.width)*curAudio.duration; }
function setVolume(v) { if(curAudio)curAudio.volume=parseFloat(v); }
document.addEventListener('keydown', e => {
  if(e.key==='Escape')closeModalDirect();
  if(e.key===' '&&document.getElementById('modalOverlay').classList.contains('open')){e.preventDefault();togglePlay();}
});
 window.addEventListener('popstate', () => {
  if (document.getElementById('modalOverlay').classList.contains('open')) closeModalNoHistory();
});
setLanguage('it');
</script>
</body>
</html>
