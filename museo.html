<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --terra: #6b4a2a; --ink: #1a1410; --smoke: #6b6058;
    --white: #fdfcfa; --accent: #c0672a; --accent-dark: #995221;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }
  header { background: var(--white); border-bottom: 1px solid var(--stone); padding: 0 5vw; display: flex; align-items: center; justify-content: space-between; height: 72px; position: sticky; top: 0; z-index: 200; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; color: var(--ink); line-height: 1.2; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-sub { font-size: 0.72rem; color: var(--smoke); letter-spacing: 0.12em; text-transform: uppercase; }
  .lang-selector { position: relative; }
  .lang-btn { display: flex; align-items: center; gap: 8px; background: none; border: 1px solid var(--stone); padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--ink); border-radius: 4px; transition: border-color 0.2s; }
  .lang-btn:hover { border-color: var(--accent); }
  .lang-btn .chevron { font-size: 0.6rem; color: var(--smoke); transition: transform 0.2s; margin-left: 2px; }
  .lang-selector.open .chevron { transform: rotate(180deg); }
  .lang-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: var(--white); border: 1px solid var(--stone); min-width: 160px; box-shadow: 0 8px 24px rgba(26,20,16,0.12); opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity 0.2s, transform 0.2s; z-index: 300; }
  .lang-selector.open .lang-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
  .lang-option { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 0.82rem; border: none; background: none; width: 100%; font-family: 'DM Sans', sans-serif; color: var(--ink); transition: background 0.15s; }
  .lang-option:hover { background: var(--sand); }
  .lang-option.active { color: var(--accent); font-weight: 500; }
  .hero { padding: 70px 5vw 50px; max-width: 720px; }
  .hero-tag { display: inline-block; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; margin-bottom: 20px; opacity: 0.8; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 300; line-height: 1.15; margin-bottom: 16px; }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { font-size: 0.95rem; color: var(--smoke); line-height: 1.7; max-width: 520px; }
  .filter-bar { padding: 0 5vw 36px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: none; border: 1px solid var(--stone); color: var(--smoke); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.08em; padding: 6px 16px; border-radius: 100px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--ink); border-color: var(--ink); color: var(--white); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; padding: 0 5vw; margin-bottom: 80px; }
  .card { background: var(--white); cursor: pointer; overflow: hidden; transition: transform 0.3s ease; }
  .card:hover { transform: translateY(-3px); }
  .card:hover .card-img img { transform: scale(1.05); }
  .card-img { width: 100%; aspect-ratio: 4/3; overflow: hidden; position: relative; background: var(--stone); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: block; }
  .card-era { position: absolute; top: 12px; left: 12px; background: rgba(26,20,16,0.75); color: #e8c990; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; backdrop-filter: blur(4px); }
  .audio-badge { position: absolute; top: 12px; right: 12px; background: var(--accent); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .audio-badge svg { width: 14px; height: 14px; fill: white; }
  .card-body { padding: 20px 22px 18px; }
  .card-location { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--clay); margin-bottom: 6px; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; line-height: 1.2; margin-bottom: 10px; }
  .card-text { font-size: 0.82rem; color: var(--smoke); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-top: 1px solid var(--stone); }
  .card-duration { font-size: 0.72rem; color: var(--smoke); }
  .btn-listen { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; transition: gap 0.2s; }
  .btn-listen:hover { gap: 10px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,20,16,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; transform: translateY(20px); transition: transform 0.3s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: 1px solid var(--stone); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; z-index: 10; color: var(--ink); transition: background 0.2s; }
  .modal-close:hover { background: var(--stone); }
  .modal-img { width: 100%; aspect-ratio: 16/7; overflow: hidden; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .modal-content { padding: 36px 40px 40px; }
  .modal-meta { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .modal-tag { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--clay); border: 1px solid var(--stone); padding: 3px 10px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 3vw, 2.4rem); font-weight: 300; line-height: 1.1; margin-bottom: 20px; }
  .modal-description { font-size: 0.9rem; line-height: 1.8; color: var(--smoke); margin-bottom: 32px; }
  .audio-player { background: var(--sand); border: 1px solid var(--stone); padding: 20px 24px; }
  .player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .player-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--clay); display: flex; align-items: center; gap: 8px; }
  .player-label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--clay); }
  .lang-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--stone); border-radius: 100px; padding: 3px 10px 3px 7px; font-size: 0.7rem; color: var(--smoke); }
  .player-controls { display: flex; align-items: center; gap: 16px; }
  .play-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.15s; }
  .play-btn:hover { background: var(--accent-dark); transform: scale(1.05); }
  .play-btn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }
  .play-btn.playing svg { margin-left: 0; }
  .player-track { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .progress-bar { width: 100%; height: 3px; background: var(--stone); border-radius: 2px; cursor: pointer; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
  .player-times { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--smoke); }
  .volume-control { display: flex; align-items: center; gap: 8px; }
  .volume-control svg { width: 16px; height: 16px; fill: var(--smoke); flex-shrink: 0; }
  input[type=range] { -webkit-appearance: none; width: 80px; height: 3px; background: var(--stone); border-radius: 2px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  footer { border-top: 1px solid var(--stone); padding: 36px 5vw; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; background: var(--white); }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--smoke); }
  .footer-copy { font-size: 0.75rem; color: var(--clay); }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--sand); } ::-webkit-scrollbar-thumb { background: var(--clay); border-radius: 3px; }
  @media (max-width: 540px) {
    header { padding: 0 4vw; }
    .header-sub { display: none; }
    .hero { padding: 50px 4vw 36px; }
    .filter-bar, .grid { padding: 0 4vw; }
    .modal-content { padding: 24px 20px 28px; }
  }
</style>
</head>

    <div class="header-sub" id="headerSub"></div>
    <div class="lang-selector" id="langSelector">

        <button class="lang-option" data-lang="de" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
      </div>
    </div>
  </div>
</header>
<section class="hero">
  <div class="hero-tag" id="heroTag"></div>
  <h1 id="heroTitle"></h1>
  <p id="heroSubtitle"></p>
</section>
<div class="filter-bar" id="filterBar"></div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

      </div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-description" id="modalDesc"></div>
      <div class="audio-player">
        <div class="player-header">
          <div class="player-label" id="playerLabel"></div>
          <div class="lang-pill"><span id="langPillFlag"></span>&nbsp;<span id="langPillText"></span></div>
        </div>
        <div class="player-controls">
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <div class="player-track">
            <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="player-times"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
          </div>
          <div class="volume-control">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer>
  <div class="footer-logo" id="footerLogo">Museo Etnografico</div>
  <div class="footer-copy" id="footerCopy"></div>
</footer>

    audio:{it:"./audios/museo_etno/it/grano.m4a",en:"./audios/museo_etno/en/mEtnoGrano.m4a",fr:null,de:null},
    t:{
      it:{
        title:"Il Grano",
        location:"Museo Etnografico",
        description:"Entrando nella sala, si incontra l'area dedicata alla lavorazione del grano, elemento fondamentale per la sopravvivenza del popolo sardo. Il grano dell'isola, frutto di una selezione naturale adattata a condizioni ambientali difficili come maestrale e siccità, era spesso minacciato anche da invasioni di cavallette spinte dai venti africani. La mietitura avveniva a luglio e il grano veniva separato dagli steli tramite il calpestio dei buoi, poi immagazzinato.\n\nIn esposizione si trova una miniatura della macina sarda, \"sa mò\", composta da due piatti di pietra: quello superiore veniva fatto ruotare da un asino bendato per evitare distrazioni e vertigini. Il grano macinato cadeva nella parte inferiore, \"su laccu\", producendo l'integrale. Da qui, con strumenti tradizionali come il setaccio e \"sa parinedda\", la farina veniva separata in diverse consistenze: dalla più fine (su scetti), alla semola fine, grossa, cruschello e crusca.\n\nLa preparazione del pane era compito delle massaie, che si alzavano presto per impastare farina, acqua, sale e lievito naturale (su framentu), ottenuto dalla fermentazione spontanea di un precedente impasto. La lievitazione richiedeva 5-6 ore e il pane così ottenuto durava fino a dieci giorni. Tipico del Sulcis è \"su mustacciu\", una focaccia circolare, e \"su coccòi\", un pane duro decorato con punte ornamentali, che esprimeva creatività e maestria delle donne.\n\nAccanto, troviamo anche le paste tradizionali: malloreddus, tallarinus, e is sappuèddus, piccoli pezzi di pasta schiacciati con le dita. Al centro, sa fregula, usata per minestre di mare, carne o legumi.\n\nTra i pani rituali spiccano \"Is Coccoisi de su Santu\", vere opere d'arte create per il patrono di Sant'Antioco. Riccamente decorati con simboli religiosi come colombe, uva, rose, grano e un fiocco rosso del martirio, testimoniano la devozione delle donne del luogo.\n\nLa sagra di Sant'Antioco Martire, documentata dal 1466, è la più antica della Sardegna. Antioco, giunto da Mauritania Cesariense, fu martirizzato sotto l'impero di Adriano ed è oggi patrono della Sardegna e protettore dei medici. La festa si celebra due settimane dopo Pasqua e prevede una solenne processione con gruppi in costume, carri e cavalli. Il sabato precedente si tiene la processione de \"is coccòis\", durante la quale il pane del Santo viene portato in chiesa, benedetto e collocato alla base del simulacro, dove resta per un anno. Quelli dell'anno precedente vengono conservati come preziose reliquie."

      en:{title:"Grain",location:"Ethnographic Museum",description:"Entering the room, you will find the area dedicated to grain processing, a fundamental element for the survival of the Sardinian people. The island’s wheat, the result of natural selection adapted to harsh environmental conditions such as the mistral wind and drought, was often also threatened by invasions of locusts carried by African winds. The harvest took place in July, and the grain was separated from the stalks by oxen trampling it, then stored. \n\nOn display is a miniature of the Sardinian mill, sa mò, made up of two stone plates: the upper one was rotated by a blindfolded donkey to prevent distractions and dizziness. The ground grain fell into the lower part, su laccu, producing wholemeal flour. From there, using traditional tools such as the sieve and sa parinedda, the flour was separated into different textures: from the finest (su scetti), to fine semolina, coarse semolina, bran meal, and bran.\n\n Bread making was the task of the housewives, who rose early to knead flour, water, salt, and natural yeast (su framentu), obtained from the spontaneous fermentation of a previous dough. The leavening took 5–6 hours, and the bread thus obtained could last up to ten days. Typical of the Sulcis area are su mustacciu, a circular flatbread, and su coccòi, a hard bread decorated with ornamental points, which expressed the creativity and skill of the women.\n\nNearby are also traditional pastas: malloreddus, tallarinus, and is sappuèddus, small pieces of dough flattened with the fingers. At the center is sa fregula, used for soups made with seafood, meat, or legumes.\n\nAmong the ritual breads, Is Coccoisi de su Santu stand out — true works of art created in honor of the patron saint of Sant’Antioco. Richly decorated with religious symbols such as doves, grapes, roses, wheat, and a red ribbon symbolizing martyrdom, they testify to the devotion of the local women.\n\n The Feast of Saint Antioco Martyr, documented since 1466, is the oldest in Sardinia. Antioco, who came from Mauretania Caesariensis, was martyred under the reign of Emperor Hadrian and is today the patron saint of Sardinia and protector of physicians. The celebration takes place two weeks after Easter and includes a solemn procession with groups in traditional costumes, carts, and horses. On the preceding Saturday, the “is coccòis” procession is held, during which the Saint’s bread is brought to the church, blessed, and placed at the base of the statue, where it remains for a year. Those from the previous year are kept as precious relics."},
      fr:{title:"Le Blé",location:"Musée Ethnographique",description:"En entrant dans la salle, on découvre l’espace consacré au travail du blé, élément fondamental pour la survie du peuple sarde. Le blé de l’île, fruit d’une sélection naturelle adaptée à des conditions environnementales difficiles comme le mistral et la sécheresse, était souvent menacé par des invasions de sauterelles poussées par les vents africains. La moisson avait lieu en juillet, et le blé était séparé des tiges grâce au piétinement des bœufs, puis stocké.\n\nOn peut y voir une miniature de la meule sarde, sa mò, composée de deux plaques de pierre : celle du dessus était actionnée par un âne aux yeux bandés pour éviter distractions et vertiges. Le blé moulu tombait dans la partie inférieure, su laccu, produisant de la farine complète. À partir de là, à l’aide d’outils traditionnels comme le tamis et sa parinedda, la farine était triée selon sa finesse : la plus fine (su scetti), la semoule fine, la semoule grossière, le son fin et le son épais.\n\nLa préparation du pain était le domaine des ménagères, qui se levaient tôt pour pétrir la farine, l’eau, le sel et le levain naturel (su framentu), obtenu par la fermentation spontanée d’une pâte précédente. La levée durait cinq à six heures, et le pain ainsi obtenu se conservait jusqu’à dix jours. Typiques du Sulcis sont su mustacciu, une galette circulaire, et su coccòi, un pain dur orné de motifs décoratifs exprimant la créativité et l’habileté des femmes.\n\nÀ côté, on trouve aussi les pâtes traditionnelles : malloreddus, tallarinus et is sappuèddus, petits morceaux de pâte aplatis avec les doigts. Au centre, sa fregula, utilisée dans les soupes de poisson, de viande ou de légumineuses.\n\nParmi les pains rituels se distinguent Is Coccoisi de su Santu, de véritables œuvres d’art créées pour le saint patron de Sant’Antioco. Riches en décorations symboliques — colombes, raisins, roses, épis de blé et ruban rouge du martyre — ils témoignent de la dévotion des femmes du village.\n\nLa fête de Sant’Antioco Martyr, attestée dès 1466, est la plus ancienne de Sardaigne. Antioco, venu de Maurétanie Césarienne, fut martyrisé sous l’empereur Hadrien et est aujourd’hui le patron de la Sardaigne et le protecteur des médecins. La fête se célèbre deux semaines après Pâques et comprend une solennelle procession avec des groupes en costume traditionnel, des chars et des chevaux. Le samedi précédent se déroule la procession des is coccòis, au cours de laquelle le pain du Saint est porté à l’église, béni et déposé au pied du simulacre, où il reste pendant un an. Ceux de l’année précédente sont conservés comme de précieuses reliques."},
      de:{title:"Das Getreide",location:"Ethnographisches Museum",description: "Beim Betreten des Saales trifft man auf den Bereich, der der Getreideverarbeitung gewidmet ist – einem grundlegenden Element für das Überleben des sardischen Volkes. Das Getreide der Insel, Ergebnis einer natürlichen Auslese, die sich an schwierige Umweltbedingungen wie den Mistral und die Trockenheit angepasst hat, wurde oft auch durch Heuschreckeninvasionen bedroht, die von den afrikanischen Winden herangetrieben wurden. Die Ernte fand im Juli statt, und das Getreide wurde durch das Stampfen der Ochsen von den Halmen getrennt und anschließend eingelagert.\n\nIn der Ausstellung befindet sich ein Miniaturmodell der sardischen Mühle, „sa mò“, bestehend aus zwei Steinscheiben: die obere wurde von einem mit verbundenen Augen versehenen Esel gedreht, um Ablenkung und Schwindel zu vermeiden. Das gemahlene Getreide fiel in den unteren Teil, „su laccu“, wodurch Vollkornmehl entstand. Von dort wurde das Mehl mit traditionellen Werkzeugen wie dem Sieb und „sa parinedda“ in verschiedene Feinheitsgrade getrennt: vom feinsten (su scetti) über feinen und groben Grieß bis hin zu Kleie und Schrot.\n\nDie Zubereitung des Brotes war Aufgabe der Hausfrauen, die früh aufstanden, um Mehl, Wasser, Salz und natürlichen Sauerteig (su framentu) zu kneten, der durch die spontane Gärung eines früheren Teigs gewonnen wurde. Das Gehenlassen dauerte 5–6 Stunden, und das so hergestellte Brot hielt bis zu zehn Tage. Typisch für den Sulcis ist „su mustacciu“, ein rundes Fladenbrot, und „su coccòi“, ein hartes, mit Zierspitzen geschmücktes Brot, das die Kreativität und Kunstfertigkeit der Frauen ausdrückte.\n\nDaneben finden sich auch traditionelle Nudelsorten: malloreddus, tallarinus und is sappuèddus, kleine, mit den Fingern geformte Stückchen Pasta. In der Mitte steht die „sa fregula“, die für Suppen mit Fisch, Fleisch oder Hülsenfrüchten verwendet wird.\n\nUnter den rituellen Broten stechen die „Is Coccoisi de su Santu“ hervor – wahre Kunstwerke, die zu Ehren des Schutzheiligen von Sant’Antioco geschaffen wurden. Reich verziert mit religiösen Symbolen wie Tauben, Trauben, Rosen, Weizen und einer roten Schleife des Martyriums, zeugen sie von der tiefen Frömmigkeit der Frauen des Ortes.\n\nDas Fest des heiligen Märtyrers Antioco, das seit dem Jahr 1466 dokumentiert ist, ist das älteste Fest Sardiniens. Antioco, der aus der Mauretania Cesariense kam, wurde unter der Herrschaft Hadrians zum Märtyrer und ist heute der Schutzheilige Sardiniens und der Ärzte. Das Fest wird zwei Wochen nach Ostern gefeiert und umfasst eine feierliche Prozession mit Gruppen in Tracht, Wagen und Pferden. Am vorhergehenden Samstag findet die Prozession der „is coccòis“ statt, bei der das Brot des Heiligen in die Kirche getragen, gesegnet und am Fuß der Statue niedergelegt wird, wo es ein Jahr lang verbleibt. Die Brote des Vorjahres werden als kostbare Reliquien aufbewahrt."},
    }
  },

    t:{
      it:{
        title:"La Palma Nana",
        location:"Museo Etnografico",
        description:"Un settore di grandissima importanza per l'economia di Sant'Antioco è quello dedicato ai manufatti realizzati con la palma nana. In Sardegna questa pianta autoctona tende a mantenersi bassa per resistere alla forza del maestrale. Neanche gli incendi riescono a scalfire la sua resistenza: la radice non muore e la pianta si sviluppa nuovamente.\n\nLo sfruttamento subito in tutto il Mediterraneo ha fatto sì che la palma nana rischiasse l'estinzione. Sull'isola di Sant'Antioco è molto diffusa e venne sfruttata in particolar modo nel periodo successivo al ripopolamento dell'isola, avvenuto nella seconda metà del Settecento. Fino agli anni Sessanta la lavorazione della palma divenne la risorsa economica principale delle persone più povere che abitavano negli ipogei punici, nel rione delle cosiddette \"grotte\".\n\nNel mese di maggio iniziava la raccolta delle foglie, che venivano messe ad essiccare durante il periodo estivo, per essere poi separate in filamenti e lavorate. Le foglie della palma nana, ricche di fibre molto resistenti, venivano impiegate in vari tipi di lavorazioni artigianali. Si ricavavano pennelli, scopette per togliere la cenere dal camino, scope per i pavimenti, borse, corde fini e grosse, il filetto utilizzato come spago e per l'impagliatura delle sedie, borse, ventagli e il crine per l'imbottitura dei materassi.\n\nTutti questi oggetti erano fondamentali perché costituivano la principale fonte di sostentamento economico dei \"gruttaiusu\". Gli abitanti delle grotte, infatti, si recavano nei paesi del Sulcis per barattare o vendere i manufatti intrecciati con la palma nana."
      },

    img:"./assets/vino.jpg",
    duration:{it:"2:03",en:"1:50",fr:"0:00",de:"0:00"},
    audio:{it:"./audios/museo_etno/it/vino.mp3",en:"./audios/museo_etno/en/mEtnoVino.mp3",fr:null,de:null},
    t:{
      it:{
        title:"Il Vino",
        location:"Museo Etnografico",
        description:"Elemento di grandissima importanza per l'economia dell'isola di Sant'Antioco, la lavorazione della vite ha origini antichissime che risalgono al periodo preistorico. Nella Sulci romana si ebbe una grandissima produzione di vino. Il tipico vitigno di Sant'Antioco è conosciuto con il nome di Carignano del Sulcis, in campidanese \"Axina 'e Spagna\", apprezzato per l'alto valore zuccherino. Si tratta di un vitigno lavorato molto basso, ad alberello, per evitare i danni causati dai venti di Maestrale e di Scirocco. Uva nera di grandissimo valore, viene attualmente utilizzata per la produzione di vini eccellenti (Turriga, Terre Brune, Arruga, Sardus Pater). Nel pannello sono esposti gli attrezzi per la lavorazione della vite: il pennato, le forbici, i segacci; le zucche secche di diverse dimensioni che diventavano le borracce per il vinello; il sacchetto di iuta per cospargere lo zolfo con cui proteggere la vite.\n\nNella parete in alto si possono distinguere gli attrezzi per la lavorazione della terra: aratri, erpici, zappe, ceste per vendemmiare (is goffasa) e cestini più piccoli. Proseguendo verso destra vedete le tenaglie per castrare i buoi. Curiosi i bastoni con una doppia funzione: da una parte la paletta in ferro per togliere il fango dall'aratro, dall'altra un chiodo per stimolare i buoi a camminare. A destra si trova la macina in ferro per le fave, alimento prediletto dagli animali adibiti alle arature. Nell'angolo gran parte degli attrezzi utili alla mietitura del grano e del foraggio e alle successive lavorazioni. In particolare si possono notare recipienti in legno di diverse dimensioni. Sono \"le misure\", antichi sistemi di misurazione delle sementi. Nel cesto in basso potete vedere i legumi coltivati a Sant'Antioco: le cicerchie, le lenticchie bianche e nere, i ceci, le fave e i cereali come il grano duro, l'avena e l'orzo. In alto a destra sono esposti gli aratri di legno usati in Sardegna sino alla seconda guerra mondiale."
      },
      en:{title:"Wine",location:"Ethnographic Museum",description:"[English translation to be added]"},

  {
    id:4, era:"Postazione IV", category:"bisso",
    img:"./assets/bisso.jpg",
    duration:{it:"3:45",en:"2:15",fr:"0:00",de:"0:00"},

    t:{
      it:{
        title:"Il Bisso",
        location:"Museo Etnografico",
        description:"La Pinna Nobilis, il più grande mollusco del Mediterraneo, conosciuto volgarmente con il nome di \"nàccara\" o \"nàcchera\", può raggiungere la notevole dimensione di centoventi centimetri di altezza. Questo mollusco si adatta molto bene alle acque basse, poco agitate e ricche di plancton. Si insedia nelle coste preferendo le praterie di posidonia oceanica.\n\nLa nàccara, negli ultimi decenni, ha rischiato l'estinzione a causa della pesca a strascico. Tale rischio ha portato la Comunità Europea a intervenire con una direttiva che ne vieta la pesca. Il mollusco è commestibile ma non prelibato; il suo sfruttamento principale era dovuto a un particolare filamento che si sviluppa all'interno della conchiglia e fuoriesce dalla base. La Pinna Nobilis si ancora ai fondali sabbiosi in posizione eretta, con la punta conficcata nel fondo; dalla base la conchiglia secerne una sostanza che, a contatto con l'acqua marina, si indurisce solidificandosi e creando una sorta di radice che tiene il mollusco ancorato al fondale sabbioso.\n\nIl bisso, o seta di mare, che ne deriva, è un filamento molto pregiato usato per la creazione dei più svariati tessuti. Il prezioso tessuto venne lavorato anche dai Fenici, dagli Egizi e dalle popolazioni italiche che si affacciavano sulle coste della Puglia, della Sicilia e della Sardegna. Con esso si producevano guanti, calze, cravatte, scialli: oggetti di lusso destinati a una committenza regale o ecclesiastica.\n\nAll'inizio del ventesimo secolo nacquero a Taranto e a Sant'Antioco iniziative mirate alla rivalutazione e alla valorizzazione del bisso. Tali iniziative portarono alla nascita di veri e propri laboratori artigianali. Alcuni oggetti risalenti alla prima metà del ventesimo secolo vennero tessuti nella scuola artigianale di Italo Diana a Sant'Antioco: si tratta di una cravatta, di uno scialle, di diversi arazzi, di giubbetti e di cuffiette da bambina.\n\nLe Pinnae Nobilis venivano pescate dalla barca con un attrezzo in ferro; successivamente dai molluschi veniva estratto il bisso grezzo. Iniziava così la pulitura: il bisso veniva battuto per eliminare le incrostazioni, lavato, asciugato, pettinato e infine cardato e filato. La difficile reperibilità della materia prima e la lunga lavorazione necessaria per filare il bisso facevano sì che si trattasse di un prodotto di lusso destinato alla più alta committenza.\n\nI manufatti realizzati in puro bisso marino mostrano, al contatto con la luce solare, uno splendore dorato e luccicante. Al tatto si presenta setoso. All'interno della conchiglia poteva trovarsi talvolta qualche perlina senza alcun valore. Il bisso marino è molto sottile, naturalmente di colore bruno tendente al castano dorato, e poteva essere colorato con la porpora tratta dai murici.\n\nNegli anni Venti l'artigiano Italo Diana creò a Sant'Antioco una scuola di tessitura del bisso e nel 1929 fu premiato con la medaglia d'oro per questa attività. L'anno successivo, in occasione della fondazione di Carbonia e dell'inaugurazione del porto di Sant'Antioco, lo stesso Diana realizzò, insieme a una sua allieva, un arazzo in bisso da donare a Mussolini, ma la moltitudine accorsa per la visita del Duce impedì la consegna e l'arazzo rimase al Diana.\n\nLa tradizione antichissima della lavorazione del bisso a Sant'Antioco non ebbe termine con la scuola di tessitura di Diana, ma proseguì grazie agli insegnamenti lasciati ad alcune donne. Nel pannello sono esposti gli attrezzi per la filatura, alcuni filamenti, una cravatta tessuta negli anni Cinquanta e diverse foto di manufatti in bisso."
      },

let lang = 'it', filter = 'all', curAudio = null, curRoom = null, playing = false;

function setLanguage(l) {
  lang = l;
  const u = UI[l];
  document.documentElement.lang = l;
  document.getElementById('currentFlag').textContent = u.flag;
  document.getElementById('currentLangLabel').textContent = l.toUpperCase();
  document.querySelectorAll('.lang-option').forEach(el => el.classList.toggle('active', el.dataset.lang === l));
  document.getElementById('langSelector').classList.remove('open');
  document.getElementById('headerSub').textContent = u.headerSub;
  document.getElementById('heroTag').textContent = u.heroTag;
  document.getElementById('heroTitle').innerHTML = u.heroTitle;
  document.getElementById('heroSubtitle').textContent = u.heroSubtitle;
  document.getElementById('footerCopy').textContent = u.footerCopy;
  renderFilters(); renderCards();
  if (document.getElementById('modalOverlay').classList.contains('open') && curRoom) refreshModal(curRoom.id);
}
function toggleLangDropdown() { document.getElementById('langSelector').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('langSelector').contains(e.target)) document.getElementById('langSelector').classList.remove('open'); });

function renderFilters() {
  document.getElementById('filterBar').innerHTML = filterCats.map((c,i) =>
    `<button class="filter-btn ${filter===c?'active':''}" onclick="applyFilter('${c}',this)">${filterLabels[lang][i]}</button>`
  ).join('');
}
function applyFilter(c, btn) {
  filter = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function renderCards() {
  const u = UI[lang];
  const list = filter === 'all' || filter === filterCats[0] ? rooms : rooms.filter(r => r.category === filter);
  document.getElementById('grid').innerHTML = list.map(r => {
    const t = r.t[lang];
    const snippet = t.description.replace(/\n/g,' ').slice(0,160)+'…';
    return `<div class="card" onclick="openModal(${r.id})">
      <div class="card-img">
        <img src="${r.img}" alt="${t.title}" loading="lazy">
        <div class="card-era">${r.era}</div>
        <div class="audio-badge"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-location">${t.location}</div>
        <div class="card-title">${t.title}</div>
        <div class="card-text">${snippet}</div>
      </div>
      <div class="card-footer">
        <span class="card-duration">⏱ ${r.duration[lang]}</span>
        <button class="btn-listen">${u.listenBtn}</button>
      </div>
    </div>`;
  }).join('');
}
function openModal(id) {
  curRoom = rooms.find(x => x.id === id);
  if (!curRoom) return;
  stopAudio(); refreshModal(id); setupAudio();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function refreshModal(id) {
  const r = rooms.find(x => x.id === id);
  const t = r.t[lang]; const u = UI[lang];
  document.getElementById('modalImg').src = r.img;
  document.getElementById('modalImg').alt = t.title;
  document.getElementById('modalEra').textContent = r.era;
  document.getElementById('modalLoc').textContent = t.location;
  document.getElementById('modalTitle').textContent = t.title;
  document.getElementById('modalDesc').innerHTML = t.description.replace(/\n\n/g,'</p><p style="margin-top:12px">');
  document.getElementById('playerLabel').textContent = u.playerLabel;
  document.getElementById('langPillFlag').textContent = u.flag;
  document.getElementById('langPillText').textContent = u.langName;
  document.getElementById('totalTime').textContent = r.duration[lang];
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
}
function setupAudio() {
  const src = curRoom.audio[lang];
  if (src) {
    curAudio = new Audio(src);
    curAudio.volume = parseFloat(document.getElementById('volumeSlider').value);
    curAudio.addEventListener('timeupdate', updateProgress);
    curAudio.addEventListener('ended', () => { playing=false; updatePlayIcon(); document.getElementById('progressFill').style.width='0%'; document.getElementById('currentTime').textContent='0:00'; });
    curAudio.addEventListener('loadedmetadata', () => { document.getElementById('totalTime').textContent = fmt(curAudio.duration); });
  } else { curAudio = null; }
}
function closeModal(e) { if (e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { stopAudio(); curRoom=null; document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; }
function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function togglePlay() { if(!curAudio){alert(UI[lang].noAudio);return;} if(playing){curAudio.pause();playing=false;}else{curAudio.play();playing=true;} updatePlayIcon(); }
function stopAudio() { if(curAudio){curAudio.pause();curAudio.currentTime=0;} playing=false; updatePlayIcon(); }
function updatePlayIcon() {
  const icon=document.getElementById('playIcon'), btn=document.getElementById('playBtn');
  if(playing){icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';btn.classList.add('playing');}
  else{icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';btn.classList.remove('playing');}
}
function updateProgress() { if(!curAudio)return; document.getElementById('progressFill').style.width=(curAudio.currentTime/curAudio.duration*100)+'%'; document.getElementById('currentTime').textContent=fmt(curAudio.currentTime); }
function seekAudio(e) { if(!curAudio||!curAudio.duration)return; const r=document.getElementById('progressBar').getBoundingClientRect(); curAudio.currentTime=((e.clientX-r.left)/r.width)*curAudio.duration; }
function setVolume(v) { if(curAudio)curAudio.volume=parseFloat(v); }
document.addEventListener('keydown', e => {
  if(e.key==='Escape')closeModalDirect();
  if(e.key===' '&&document.getElementById('modalOverlay').classList.contains('open')){e.preventDefault();togglePlay();}
});
setLanguage('it');
</script>
